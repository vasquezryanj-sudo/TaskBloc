<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f3ede2;--bg2:#e8e0d0;--surface:#fffdf7;--surface2:#f7f0e5;--surface3:#ebe2d1;
  --border:#d8cab5;--border2:#c5b49a;
  --accent:#c04820;--accent-light:#fcece4;--accent2:#4a8850;--accent2-light:#e2f0e4;
  --text:#1e150c;--text2:#5e4e3c;--text3:#9a8a72;
  --gold:#a87e1c;--gold-light:#fdf0d0;--purple:#6d50a0;--purple-light:#ece5f5;
  --shadow:rgba(40,24,8,0.05);--shadow2:rgba(40,24,8,0.10);--shadow3:rgba(40,24,8,0.18);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;}
body{background-image:radial-gradient(ellipse at 15% 80%,rgba(192,72,32,0.04) 0%,transparent 50%),radial-gradient(ellipse at 85% 15%,rgba(109,80,160,0.03) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(168,126,28,0.02) 0%,transparent 60%);}
#root{height:100%;}
::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(197,180,154,0.4);border-radius:10px;transition:background .2s;}
::-webkit-scrollbar-thumb:hover{background:rgba(197,180,154,0.7);}
*{scrollbar-width:thin;scrollbar-color:rgba(197,180,154,0.4) transparent;}
.app{display:flex;height:100dvh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:linear-gradient(180deg,var(--surface) 0%,var(--surface2) 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:14px 16px 12px;gap:2px;box-shadow:1px 0 8px var(--shadow),4px 0 24px var(--shadow),8px 0 48px var(--shadow);overflow-y:auto;flex-shrink:0;}
.sidebar-logo{font-family:'Fraunces',serif;font-weight:700;font-size:23px;color:var(--accent);margin-bottom:2px;letter-spacing:-0.5px;}
.sidebar-sub{font-size:10px;color:var(--text3);margin-bottom:8px;letter-spacing:0.6px;text-transform:lowercase;}
.sidebar-section{font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);padding:8px 10px 4px;}
.s-day{padding:9px 10px;border-radius:10px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);border:1.5px solid transparent;position:relative;}
.s-day:hover{background:var(--surface2);transform:translateX(2px);}
.s-day.active{background:var(--surface2);border-color:var(--border);box-shadow:0 1px 4px var(--shadow);position:relative;z-index:1;transform:translateY(-1px);}
.s-day.today{border-color:var(--accent)!important;background:var(--accent-light);}
.s-day-label{font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);transition:color .2s;}
.s-day.today .s-day-label{color:var(--accent);}
.s-day-date{font-size:12px;font-weight:600;color:var(--text);margin-top:1px;}
.s-day-count{font-size:9px;color:var(--text3);margin-top:1px;}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:12px 28px 36px;display:flex;flex-direction:column;gap:20px;scroll-behavior:smooth;scrollbar-gutter:stable;}

/* DAY BLOCK */
.day-block{background:var(--surface);border:2px solid var(--accent);border-radius:18px;padding:24px;box-shadow:0 1px 3px var(--shadow),0 4px 16px var(--shadow),0 8px 32px rgba(40,24,8,0.04);position:relative;animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both;}
.block-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.block-title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.block-title{font-family:'Fraunces',serif;font-weight:700;font-size:24px;color:var(--text);letter-spacing:-0.3px;}
.block-sub{font-family:'Plus Jakarta Sans',sans-serif;font-weight:400;font-size:11px;color:var(--text3);margin-top:3px;font-style:italic;letter-spacing:0.2px;}

/* DONE BADGES */
.done-badges{display:flex;align-items:center;gap:3px;position:relative;cursor:pointer;margin-top:2px;}
.done-badge{width:16px;height:16px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;border:1.5px solid var(--surface);margin-left:-4px;transition:all .2s cubic-bezier(.34,1.56,.64,1);box-shadow:0 1px 3px rgba(74,136,80,0.2);}
.done-badge:first-child{margin-left:0;}
.done-badges:hover .done-badge{transform:scale(1.2);}
.done-bubble{position:absolute;top:calc(100% + 8px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;min-width:200px;max-width:280px;box-shadow:0 4px 12px var(--shadow2),0 12px 32px var(--shadow3);z-index:50;animation:mIn .2s cubic-bezier(.34,1.56,.64,1);}
.done-bubble-title{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:700;margin-bottom:8px;}
.done-bubble-item{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);text-decoration:line-through;}
.done-bubble-item:last-child{border-bottom:none;}
.done-bubble-check{width:14px;height:14px;border-radius:50%;background:var(--accent2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;}
.done-bubble-close{display:block;margin-top:8px;font-size:10px;color:var(--text3);text-align:center;cursor:pointer;font-style:italic;}
.done-bubble-close:hover{color:var(--accent);}

/* TASK LIST - scrollable */
.task-list-wrap{overflow-y:auto;max-height:calc(4 * 58px - 8px);display:flex;flex-direction:column;gap:6px;padding:4px 4px;}
.task-list-wrap{scrollbar-gutter:stable;}
.task-list-wrap::-webkit-scrollbar{width:2px;}
.task-list-wrap::-webkit-scrollbar-thumb{background:rgba(197,180,154,0.4);border-radius:10px;}

/* BUTTONS */
.btn{padding:7px 16px;border-radius:20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .2s cubic-bezier(.4,0,.2,1);white-space:nowrap;position:relative;overflow:hidden;}
.btn:hover{background:var(--surface3);border-color:var(--border2);color:var(--text);transform:translateY(-1px);box-shadow:0 2px 8px var(--shadow2);}
.btn:active{transform:translateY(0) scale(.97);box-shadow:none;transition-duration:.1s;}
.btn:disabled{opacity:.5;cursor:default;transform:none!important;box-shadow:none!important;}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(192,72,32,0.2);}
.btn.primary:hover{background:#a83c18;box-shadow:0 4px 14px rgba(192,72,32,0.3);}
.btn.gold{background:var(--gold-light);border-color:#d8b050;color:var(--gold);}
.btn.gold:hover{background:#fcefd0;border-color:var(--gold);}
.btn.danger{background:#fde8e8;border-color:#f0b8b8;color:#c0392b;}
.btn.danger:hover{background:#fbd0d0;}
.btn.sm{padding:5px 12px;font-size:11px;}
.btn.purple{background:var(--purple-light);border-color:#c0a8e0;color:var(--purple);}
.btn.purple:hover{background:#e4daf2;}

.add-row{display:flex;gap:8px;margin-bottom:14px;}
.add-input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:10px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:all .25s cubic-bezier(.4,0,.2,1);min-width:0;}
.add-input::placeholder{color:var(--text3);transition:color .2s;}
.add-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(192,72,32,.08),0 2px 8px var(--shadow);}
.add-input:focus::placeholder{color:var(--border2);}

/* TASK ITEMS */
.task-item{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:9px;cursor:grab;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;user-select:none;box-shadow:0 1px 2px var(--shadow);flex-shrink:0;}
.task-item:hover{border-color:var(--border2);background:var(--surface);box-shadow:0 2px 6px var(--shadow),0 6px 20px var(--shadow2);transform:translateY(-2px);}
.task-item.dragging{cursor:grabbing;transform:scale(.98);}
.task-item.drag-over{border-color:var(--accent);border-style:dashed;background:var(--accent-light);}
.drag-handle{color:var(--text3);font-size:13px;opacity:.3;flex-shrink:0;transition:opacity .2s;}
.task-item:hover .drag-handle{opacity:.8;}
.task-check-zone{flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:8px;margin:-8px;cursor:pointer;}
.task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.task-check-zone:hover .task-check{border-color:var(--accent2);background:var(--accent2-light);transform:scale(1.1);}
.task-check.on{background:var(--accent2);border-color:var(--accent2);box-shadow:0 0 0 3px rgba(74,136,80,0.15);}
.task-check.on::after{content:'✓';font-size:10px;color:#fff;font-weight:700;}
.task-body{flex:1;min-width:0;}
.task-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.task-status{font-size:10px;color:var(--accent);margin-top:2px;font-style:italic;font-weight:500;}
.task-meta{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.attach-badge{font-size:10px;color:var(--text3);}


.drop-zone-hint{border:2px dashed var(--border);border-radius:12px;padding:10px;text-align:center;font-size:11px;color:var(--text3);margin-top:10px;transition:all .25s cubic-bezier(.4,0,.2,1);font-style:italic;flex-shrink:0;}
.drop-zone-hint.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light);border-style:solid;}

/* WEEK STRIP */
.strip-label{font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:1.8px;color:var(--text3);}
.week-row{display:flex;gap:10px;overflow-x:auto;padding:4px 0 6px;scroll-snap-type:x mandatory;}
.week-card{min-width:145px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:13px;flex-shrink:0;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 3px var(--shadow),0 3px 10px var(--shadow);scroll-snap-align:start;}
.week-card:hover{border-color:var(--border2);box-shadow:0 2px 6px var(--shadow),0 6px 20px var(--shadow2);transform:translateY(-3px);}
.week-card.drop-target{border-color:var(--accent)!important;background:var(--accent-light);}
.week-card.is-today{border-color:var(--accent);background:var(--accent-light);box-shadow:0 2px 8px rgba(192,72,32,0.08),0 6px 20px var(--shadow);}
.week-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.week-day-name{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);}
.week-day-month{font-size:8px;color:var(--text3);margin-top:1px;}
.week-day-num{font-family:'Fraunces',serif;font-weight:700;font-size:22px;color:var(--text);line-height:1;letter-spacing:-0.5px;}
.week-pill{background:var(--surface2);border-radius:6px;padding:4px 8px;font-size:10px;color:var(--text2);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px;border:1px solid var(--border);transition:all .15s;}
.week-pill.done{text-decoration:line-through;color:var(--text3);}
.week-pill-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.week-pill.done .week-pill-dot{background:var(--text3);}
.week-empty{font-size:10px;color:var(--text3);font-style:italic;}

/* LOOKING FORWARD */
.lf-block{background:var(--surface);border:2px solid var(--purple);border-radius:18px;padding:22px;box-shadow:0 1px 3px var(--shadow),0 4px 16px var(--shadow);position:relative;animation:fadeUp .5s cubic-bezier(.4,0,.2,1) .2s both;overflow-x:hidden;}
.lf-block.drop-active{border-color:var(--purple);background:var(--purple-light);}
.lf-title{font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:var(--text);margin-bottom:4px;letter-spacing:-0.2px;}
.lf-sub{font-size:11px;color:var(--text3);font-style:italic;margin-bottom:12px;letter-spacing:0.1px;}
.lf-list{overflow-y:auto;overflow-x:hidden;max-height:160px;display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.lf-list{scrollbar-gutter:stable;}
.lf-list::-webkit-scrollbar{width:2px;}
.lf-list::-webkit-scrollbar-thumb{background:rgba(197,180,154,0.4);border-radius:10px;}
.lf-item{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:9px;box-shadow:0 1px 3px var(--shadow);transition:all .25s cubic-bezier(.4,0,.2,1);flex-shrink:0;}
.lf-item .task-check-zone{margin:0;padding:6px;margin:-6px;position:relative;z-index:2;}
.lf-item:hover{border-color:var(--border2);background:var(--surface);transform:translateX(2px);box-shadow:0 2px 8px var(--shadow2);}
.lf-dot{width:7px;height:7px;border-radius:50%;background:var(--purple);flex-shrink:0;opacity:.6;}
.lf-name{flex:1;font-size:13px;font-weight:600;color:var(--text);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lf-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:5px;transition:all .12s;}
.lf-remove:hover{color:var(--accent);background:var(--accent-light);}
.lf-drop-hint{border:2px dashed var(--border);border-radius:10px;padding:14px;text-align:center;font-size:12px;color:var(--text3);font-style:italic;transition:all .15s;}
.lf-block.drop-active .lf-drop-hint{border-color:var(--purple);color:var(--purple);background:rgba(139,111,181,.05);}
.lf-add-row{display:flex;gap:8px;margin-bottom:10px;}
.lf-add-input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:8px 14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:all .25s cubic-bezier(.4,0,.2,1);min-width:0;}
.lf-add-input::placeholder{color:var(--text3);transition:color .2s;}
.lf-add-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(109,80,160,.08),0 2px 8px var(--shadow);}
.lf-add-input:focus::placeholder{color:var(--border2);}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(30,20,10,.5);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(12px) saturate(1.2);-webkit-backdrop-filter:blur(12px) saturate(1.2);padding:16px;animation:overlayIn .25s cubic-bezier(.4,0,.2,1) both;}
@keyframes overlayIn{from{opacity:0;backdrop-filter:blur(0);-webkit-backdrop-filter:blur(0);}to{opacity:1;}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:500px;max-height:90dvh;overflow-y:auto;display:flex;flex-direction:column;gap:16px;animation:mIn .3s cubic-bezier(.34,1.56,.64,1) both;box-shadow:0 4px 16px var(--shadow2),0 16px 48px var(--shadow3),0 0 0 1px rgba(255,253,247,.5) inset;}
@keyframes mIn{from{opacity:0;transform:scale(.92) translateY(12px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;}
.modal-title{font-family:'Fraunces',serif;font-weight:600;font-size:19px;color:var(--text);flex:1;margin-right:10px;line-height:1.3;letter-spacing:-0.2px;}
.modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--text3);font-size:13px;cursor:pointer;padding:5px 9px;border-radius:8px;transition:all .2s cubic-bezier(.4,0,.2,1);}
.modal-close:hover{background:var(--surface3);color:var(--text);transform:scale(1.05);}
.field label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:5px;font-weight:700;}
.m-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:all .25s cubic-bezier(.4,0,.2,1);}
.m-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(192,72,32,.08),0 2px 8px var(--shadow);}
.m-input::placeholder{color:var(--text3);transition:color .2s;}
.m-input:focus::placeholder{color:var(--border2);}
.m-textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:80px;transition:all .25s cubic-bezier(.4,0,.2,1);line-height:1.6;}
.m-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(192,72,32,.08),0 2px 8px var(--shadow);}
.m-textarea::placeholder{color:var(--text3);transition:color .2s;}
.m-textarea:focus::placeholder{color:var(--border2);}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);}
.modal-footer{display:flex;justify-content:space-between;align-items:center;padding-top:6px;border-top:1px solid var(--border);}
.footer-right{display:flex;gap:8px;}
.trash-btn{background:none;border:1.5px solid #f0b8b8;border-radius:20px;color:#c0392b;cursor:pointer;padding:6px 13px;display:flex;align-items:center;gap:5px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;transition:all .2s cubic-bezier(.4,0,.2,1);}
.trash-btn:hover{background:#fde8e8;transform:translateY(-1px);}

/* ROLLOVER MODAL */
.rollover-list{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;padding:2px 0;}
.rollover-item{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;transition:all .2s cubic-bezier(.4,0,.2,1);}
.rollover-item:hover{border-color:var(--border2);background:var(--surface);}
.rollover-item-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;opacity:.7;}
.rollover-item-name{flex:1;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.rollover-item-status{font-size:10px;color:var(--text3);font-style:italic;white-space:nowrap;}
.rollover-actions{display:flex;gap:5px;flex-shrink:0;}
.rollover-actions .btn{padding:4px 10px;font-size:10px;border-radius:14px;}
.rollover-actions .btn.complete{background:var(--accent2-light);border-color:var(--accent2);color:var(--accent2);}
.rollover-actions .btn.complete:hover{background:var(--accent2);color:#fff;}
.rollover-actions .btn.remove{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.rollover-actions .btn.remove:hover{background:var(--accent);color:#fff;}
.rollover-sub{font-size:12px;color:var(--text3);line-height:1.5;font-style:italic;}
.rollover-footer{display:flex;justify-content:flex-end;gap:8px;padding-top:8px;border-top:1px solid var(--border);}

/* ATTACHMENTS */
.file-drop{border:2px dashed var(--border2);border-radius:10px;padding:10px 14px;text-align:center;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);background:var(--surface2);position:relative;display:flex;align-items:center;justify-content:center;gap:8px;}
.file-drop:hover,.file-drop.over{border-color:var(--accent);background:var(--accent-light);border-style:solid;}
.file-drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.file-drop-icon{font-size:14px;line-height:1;}
.file-drop-label{font-size:11px;font-weight:600;color:var(--text2);line-height:1;}
.file-drop-sub{font-size:10px;color:var(--text3);font-style:italic;line-height:1;}
.link-row{display:flex;gap:7px;}
.attach-list{display:flex;flex-direction:column;gap:5px;}
.attach-item{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:8px 11px;transition:all .12s;}
.attach-item:hover{border-color:var(--border2);background:var(--surface);}
.a-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.a-icon.pdf{background:#fde8e8;}.a-icon.img{background:#e8f0e9;}.a-icon.doc{background:#e8eef8;}.a-icon.lnk{background:var(--gold-light);}.a-icon.def{background:var(--surface3);}
.a-info{flex:1;min-width:0;}
.a-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.a-meta{font-size:10px;color:var(--text3);font-style:italic;}
.a-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:5px;transition:all .12s;}
.a-remove:hover{color:var(--accent);background:var(--accent-light);}

/* SYNC */
.sync-bar{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text3);padding:0;margin-bottom:4px;}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s;}
.sync-dot.ok{background:var(--accent2);box-shadow:0 0 4px rgba(74,136,80,0.3);}
.sync-dot.err{background:#c0392b;box-shadow:0 0 4px rgba(192,57,43,0.3);}
.sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite;box-shadow:0 0 4px rgba(168,126,28,0.3);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.sync-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:0 2px;line-height:1;opacity:.55;transition:opacity .15s;}
.sync-btn:hover{opacity:1;}
.sync-btn:disabled{cursor:default;opacity:.35;}
.sync-btn.spinning{animation:spin .8s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* PULL-TO-REFRESH */
.pull-indicator{display:flex;align-items:flex-end;justify-content:center;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);overflow:hidden;padding-bottom:8px;opacity:.8;transition:opacity .15s;}

/* MOBILE */
.mob-nav{display:none;}
@media(max-width:680px){
  input, textarea, select, .add-input, .lf-add-input, .m-input, .m-textarea, .m-select {
    font-size: 16px !important;
  }
  .sidebar{display:none;}
  .main{padding:8px 12px 85px;gap:12px;}
  .sync-bar{font-size:8px;padding:0;gap:3px;margin-bottom:-6px;}
  .sync-dot{width:4px;height:4px;}
  .day-block{padding:14px 13px;border-radius:14px;}
  .block-title{font-size:20px;}
  .block-sub{font-size:10px;}
  .add-input{font-size:14px;padding:9px 13px;}
  .task-item{padding:10px 10px;}
  .task-name{font-size:14px;}
  .week-card{min-width:125px;padding:9px;}
  .week-day-num{font-size:18px;}
  .lf-block{padding:14px 13px;}
  .lf-list{max-height:160px;}
  .overlay{align-items:flex-end;padding:0;}
  .modal{border-radius:20px 20px 0 0;max-height:92dvh;padding:24px 20px;padding-bottom:calc(24px + var(--safe-bottom));}
  .mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:calc(60px + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(255,253,247,.85);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border-top:1px solid rgba(216,202,181,.5);align-items:center;justify-content:space-around;z-index:100;box-shadow:0 -1px 8px var(--shadow),0 -4px 20px var(--shadow);}
  .mob-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text3);font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;font-weight:700;padding:6px 20px;border-radius:12px;transition:all .2s cubic-bezier(.4,0,.2,1);text-transform:uppercase;letter-spacing:.7px;flex:1;}
  .mob-btn.active{color:var(--accent);background:var(--accent-light);}
  .mob-icon{font-size:20px;line-height:1;transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
  .mob-btn.active .mob-icon{transform:scale(1.15);}
}

/* ── MEDIA / READING TRACKER ── */
.media-page{display:flex;flex-direction:column;gap:24px;}
.media-block{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:0 1px 3px var(--shadow),0 4px 16px var(--shadow);position:relative;animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both;}
.media-block::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent2),#5cb862,#88d490);border-radius:18px 18px 0 0;z-index:1;}
.media-block-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.media-block-title{font-family:'Fraunces',serif;font-weight:700;font-size:21px;color:var(--text);letter-spacing:-0.3px;}
.media-block-sub{font-size:11px;color:var(--text3);font-style:italic;margin-bottom:16px;letter-spacing:0.1px;}
.media-list{display:flex;flex-direction:column;gap:10px;}
.media-entry{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;transition:all .25s cubic-bezier(.4,0,.2,1);}
.media-entry:hover{border-color:var(--border2);background:var(--surface);box-shadow:0 2px 8px var(--shadow2);transform:translateY(-1px);}
.media-entry-header{display:flex;align-items:flex-start;gap:10px;}
.media-entry-emoji{font-size:22px;line-height:1;flex-shrink:0;margin-top:1px;}
.media-entry-info{flex:1;min-width:0;cursor:pointer;}
.media-entry-title{font-size:14px;font-weight:700;color:var(--text);}
.media-entry-author{font-size:11px;color:var(--text3);margin-top:2px;font-style:italic;}
.media-entry-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.media-complete-btn{background:none;border:1.5px solid var(--border);border-radius:20px;padding:4px 10px;font-size:10px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;color:var(--text3);cursor:pointer;transition:all .15s;}
.media-complete-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.media-complete-btn.done{background:var(--accent2-light);border-color:var(--accent2);color:var(--accent2);}
.media-edit-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px 6px;border-radius:6px;transition:all .12s;}
.media-edit-btn:hover{color:var(--accent);background:var(--accent-light);}
.media-remove-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:4px 6px;border-radius:6px;transition:all .12s;}
.media-remove-btn:hover{color:#c0392b;background:#fde8e8;}

/* QUOTES */
.quotes-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.quotes-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:700;margin-bottom:8px;}
.quote-list{display:flex;flex-direction:column;gap:7px;}
.quote-card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;position:relative;transition:all .2s cubic-bezier(.4,0,.2,1);}
.quote-card:hover{border-color:var(--border2);box-shadow:0 2px 6px var(--shadow);}
.quote-text{font-family:'Fraunces',serif;font-size:13px;color:var(--text);font-style:italic;line-height:1.7;margin-bottom:6px;padding-right:50px;}
.quote-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.quote-page{font-size:10px;color:var(--text3);}
.quote-tag{background:var(--accent-light);border:1px solid var(--border);border-radius:10px;padding:2px 7px;font-size:9px;color:var(--accent);font-weight:600;}
.quote-actions{position:absolute;top:7px;right:7px;display:flex;gap:3px;opacity:0;transition:opacity .15s;}
.quote-card:hover .quote-actions{opacity:1;}
.quote-action-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:3px 5px;border-radius:5px;transition:all .12s;}
.quote-action-btn:hover{color:var(--accent);background:var(--accent-light);}
.quote-action-btn.danger:hover{color:#c0392b;background:#fde8e8;}
.add-quote-row{display:flex;gap:7px;margin-top:10px;}
.add-quote-input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:7px 13px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:var(--text);outline:none;transition:all .25s cubic-bezier(.4,0,.2,1);min-width:0;}
.add-quote-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(168,126,28,.08),0 2px 8px var(--shadow);}
.add-quote-input::placeholder{color:var(--text3);transition:color .2s;}
.add-quote-input:focus::placeholder{color:var(--border2);}

/* COMPLETED MEDIA */
.completed-media-block{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:0 1px 3px var(--shadow),0 4px 16px var(--shadow);position:relative;animation:fadeUp .5s cubic-bezier(.4,0,.2,1) .1s both;}
.completed-media-block::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold),#d8a030,#e8c060);border-radius:18px 18px 0 0;z-index:1;}
.completed-media-title{font-family:'Fraunces',serif;font-weight:700;font-size:19px;color:var(--text);margin-bottom:14px;letter-spacing:-0.2px;}
.completed-grid{display:flex;flex-direction:column;gap:7px;}
.completed-item{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;transition:all .2s cubic-bezier(.4,0,.2,1);}
.completed-item:hover{background:var(--surface);border-color:var(--border2);}
.completed-item-emoji{font-size:16px;flex-shrink:0;}
.completed-item-info{flex:1;min-width:0;}
.completed-item-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.completed-item-author{font-size:10px;color:var(--text3);font-style:italic;}
.view-all-btn{display:block;width:100%;margin-top:14px;padding:11px;border:1.5px dashed var(--border2);border-radius:12px;background:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;text-align:center;transition:all .25s cubic-bezier(.4,0,.2,1);}
.view-all-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);border-style:solid;transform:translateY(-1px);}

/* ALL COMPLETED PAGE */
.all-completed-page{display:flex;flex-direction:column;gap:24px;}
.all-completed-back{display:flex;align-items:center;gap:8px;background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;padding:0;transition:color .15s;}
.all-completed-back:hover{color:var(--accent);}
.all-completed-section{display:flex;flex-direction:column;gap:10px;}
.all-completed-section-title{font-family:'Fraunces',serif;font-weight:700;font-size:18px;color:var(--text);display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1.5px solid var(--border);letter-spacing:-0.2px;}
.completed-full-item{display:flex;align-items:flex-start;gap:10px;padding:13px 15px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;transition:all .25s cubic-bezier(.4,0,.2,1);}
.completed-full-item:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-1px);box-shadow:0 2px 8px var(--shadow2);}
.completed-full-info{flex:1;}
.completed-full-title{font-size:14px;font-weight:700;color:var(--text);}
.completed-full-author{font-size:11px;color:var(--text3);font-style:italic;margin-top:2px;}
.completed-full-date{font-size:10px;color:var(--text3);margin-top:4px;}

/* SIDEBAR READING NAV */
.s-reading-link{padding:9px 10px;border-radius:10px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);border:1.5px solid transparent;display:flex;align-items:center;gap:8px;}
.s-reading-link:hover{background:var(--surface2);transform:translateX(2px);}
.s-reading-link.active{background:var(--surface2);border-color:var(--border);box-shadow:0 1px 4px var(--shadow);}
.s-reading-link-label{font-size:12px;font-weight:600;color:var(--text2);}

/* TAG CHIPS */
.tag-chip{display:inline-flex;align-items:center;gap:3px;border-radius:8px;padding:2px 6px;font-size:9px;font-weight:700;line-height:1.3;white-space:nowrap;}
.tag-chip-x{background:none;border:none;cursor:pointer;padding:0 0 0 2px;font-size:9px;opacity:.6;line-height:1;color:inherit;}
.tag-chip-x:hover{opacity:1;}
.estimate-tag{background:var(--gold-light);border:1px solid #e0c070;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0;white-space:nowrap;}
.task-name-row{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.task-meta-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:3px;}
.task-date-label{font-size:9px;color:var(--text3);background:var(--surface3);border-radius:5px;padding:1px 5px;font-weight:600;white-space:nowrap;}
.tag-swatch{width:20px;height:20px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);flex-shrink:0;}
.tag-swatch:hover{transform:scale(1.15);}
.tag-swatch.sel{transform:scale(1.25);box-shadow:0 2px 6px rgba(0,0,0,0.15);}
.tag-swatches{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.tag-chips-wrap{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;min-height:22px;}

/* PROJECT CARDS */
.proj-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 1px 3px var(--shadow),0 4px 16px var(--shadow);border-left:4px solid var(--accent);animation:fadeUp .4s cubic-bezier(.4,0,.2,1) both;}
.proj-card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.proj-card-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.proj-card-name{font-family:'Fraunces',serif;font-weight:700;font-size:18px;color:var(--text);flex:1;letter-spacing:-0.2px;}
.proj-task-list{display:flex;flex-direction:column;gap:5px;}
.proj-task-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;font-size:12px;color:var(--text);transition:all .15s;}
.proj-task-item:hover{background:var(--surface);border-color:var(--border2);}
.proj-task-item.done{}
.proj-task-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.proj-task-check{width:16px;height:16px;border-radius:50%;background:var(--accent2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;}
.proj-task-name{flex:1;min-width:0;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.proj-done-toggle{background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;padding:10px 0 4px;transition:color .15s;text-align:left;}
.proj-done-toggle:hover{color:var(--text2);}
.proj-chip{display:inline-flex;align-items:center;gap:3px;border-radius:8px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;border:1.5px solid;user-select:none;}
.proj-chip:hover{transform:translateY(-1px);box-shadow:0 2px 6px var(--shadow);}

/* SETTINGS */

const fIcon=n=>{if(!n)return{icon:'🔗',cls:'lnk'};const e=n.split('.').pop().toLowerCase();if(['jpg','jpeg','png','gif','webp','svg'].includes(e))return{icon:'🖼',cls:'img'};if(e==='pdf')return{icon:'📄',cls:'pdf'};if(['doc','docx','txt','md'].includes(e))return{icon:'📝',cls:'doc'};return{icon:'📎',cls:'def'};};

// ── OFFLINE QUEUE ──
const QUEUE_KEY='taskbloc_queue';
function qLoad(){try{return JSON.parse(localStorage.getItem(QUEUE_KEY))||[];}catch{return[];}}
function qSave(q){localStorage.setItem(QUEUE_KEY,JSON.stringify(q));}
function qAdd(op){const q=qLoad();q.push(op);qSave(q);}

async function qFlush(){
  if(!navigator.onLine)return;
  const q=qLoad();
  if(q.length===0)return;
  qSave([]); // optimistically clear
  try{
    await Promise.all(q.map(op=>{
      if(op.type==='upsertTask')return sb.from('tasks').upsert(op.data);
      if(op.type==='deleteTask')return sb.from('tasks').delete().eq('id',op.id);
      if(op.type==='upsertForward')return sb.from('forward_tasks').upsert(op.data);
      if(op.type==='deleteForward')return sb.from('forward_tasks').delete().eq('id',op.id);
      if(op.type==='upsertProject')return sb.from('projects').upsert(op.data);
    }));
  }catch(e){
    // restore queue if flush fails
    const remaining=qLoad();
    qSave([...q,...remaining]);
    throw e;
  }
}

// Flush queue whenever we come back online
window.addEventListener('online',()=>qFlush().catch(console.error));

async function dbLoadTasks(){
  if(!navigator.onLine){
    try{return JSON.parse(localStorage.getItem('taskbloc_tasks'))||{};}catch{return{};}
  }
  const{data,error}=await sb.from('tasks').select('*').eq('user_id',currentUserId).order('position');
  if(error)throw error;
  const map={};(data||[]).forEach(r=>{if(!map[r.day_key])map[r.day_key]=[];map[r.day_key].push({id:r.id,name:r.name,status:r.status,context:r.context,complete:r.complete,attachments:r.attachments||[],tags:r.tags||[],due:r.due||'',estimate:r.estimate||'',recurring:r.recurring||false,recurringFrequency:r.recurring_frequency||''});});
  return map;
}
async function dbLoadForward(){
  if(!navigator.onLine){
    try{return JSON.parse(localStorage.getItem('taskbloc_forward'))||[];}catch{return[];}
  }
  const{data,error}=await sb.from('forward_tasks').select('*').eq('user_id',currentUserId).order('position');
  if(error)throw error;
  return(data||[]).map(r=>({id:r.id,name:r.name,status:r.status,context:r.context,complete:r.complete,attachments:r.attachments||[],tags:r.tags||[],due:r.due||'',estimate:r.estimate||'',recurring:r.recurring||false,recurringFrequency:r.recurring_frequency||''}));
}
async function dbUpsertTask(task,dayKey,position){
  const data={id:task.id,user_id:currentUserId,day_key:dayKey,name:task.name,status:task.status,context:task.context,complete:task.complete,attachments:task.attachments,tags:task.tags||[],due:task.due||'',estimate:task.estimate||'',recurring:task.recurring||false,recurring_frequency:task.recurringFrequency||'',position};
  if(!navigator.onLine){qAdd({type:'upsertTask',data});return;}
  try{await sb.from('tasks').upsert(data);}catch(e){qAdd({type:'upsertTask',data});throw e;}
}
async function dbDeleteTask(id){
  if(!navigator.onLine){qAdd({type:'deleteTask',id});return;}
  try{await sb.from('tasks').delete().eq('id',id);}catch(e){qAdd({type:'deleteTask',id});throw e;}
}
async function dbUpsertForward(task,position){
  const data={id:task.id,user_id:currentUserId,name:task.name,status:task.status,context:task.context,complete:task.complete,attachments:task.attachments,tags:task.tags||[],due:task.due||'',estimate:task.estimate||'',recurring:task.recurring||false,recurring_frequency:task.recurringFrequency||'',position};
  if(!navigator.onLine){qAdd({type:'upsertForward',data});return;}
  try{await sb.from('forward_tasks').upsert(data);}catch(e){qAdd({type:'upsertForward',data});throw e;}
}
async function dbDeleteForward(id){
  if(!navigator.onLine){qAdd({type:'deleteForward',id});return;}
  try{await sb.from('forward_tasks').delete().eq('id',id);}catch(e){qAdd({type:'deleteForward',id});throw e;}
}

async function dbLoadProjects(){
  if(!navigator.onLine){try{return JSON.parse(localStorage.getItem('taskbloc_projects'))||[];}catch{return[];}}
  const{data,error}=await sb.from('projects').select('*').eq('user_id',currentUserId).order('created_at');
  if(error)throw error;
  const list=(data||[]).map(r=>({id:r.id,name:r.name,color:r.color,archived:r.archived}));

  return list;
}
async function dbUpsertProject(project){

  if(!navigator.onLine){qAdd({type:'upsertProject',data});return;}
  try{await sb.from('projects').upsert(data);}catch(e){qAdd({type:'upsertProject',data});throw e;}
}

const tagName=t=>typeof t==='string'?t:(t&&t.label)||'';

function Attachments({attachments,onChange}){
  const [over,setOver]=useState(false);
  const addFiles=fs=>{const n=Array.from(fs).map(f=>({id:uid(),name:f.name,size:f.size,type:'file',url:null}));onChange([...attachments,...n]);};
  const remove=id=>onChange(attachments.filter(a=>a.id!==id));
  return(<div style={{display:'flex',flexDirection:'column',gap:'9px'}}>
    <div className={'file-drop'+(over?' over':'')} onDragOver={e=>{e.preventDefault();setOver(true);}} onDragLeave={()=>setOver(false)} onDrop={e=>{e.preventDefault();setOver(false);addFiles(e.dataTransfer.files);}}>
      <input type="file" multiple onChange={e=>addFiles(e.target.files)}/><span className="file-drop-icon">📁</span><span className="file-drop-label">Drop files or tap to browse</span><span className="file-drop-sub">· Syncs once storage connected</span>
    </div>
    {attachments.length>0&&<div className="attach-list">{attachments.map(a=>{const{icon,cls}=fIcon(a.name);return(<div key={a.id} className="attach-item"><div className={'a-icon '+cls}>{icon}</div><div className="a-info"><div className="a-name">{a.name}</div><div className="a-meta">{fmtSize(a.size)+' · pending'}</div></div><button className="a-remove" onClick={()=>remove(a.id)}>✕</button></div>);})}</div>}
  </div>);
}

const TAG_COLORS=['#e74c3c','#e67e22','#f39c12','#27ae60','#1abc9c','#2980b9','#8e44ad','#e91e8c'];

function TaskModal({task,onClose,onSave,onDelete,projects,onCreateProject}){
  const [name,setName]=useState(task.name||'');
  const [status,setStatus]=useState(task.status||'');
  const [context,setContext]=useState(task.context||'');
  const [attachments,setAttachments]=useState(task.attachments||[]);
  const [tags,setTags]=useState(()=>(task.tags||[]).map(tagName));
  const [due,setDue]=useState(task.due||'');
  const [estimate,setEstimate]=useState(task.estimate||'');
  const [recurring,setRecurring]=useState(task.recurring||false);
  const [recurringFrequency,setRecurringFrequency]=useState(task.recurringFrequency||'Daily');
  const [confirming,setConfirming]=useState(false);
  const [newProj,setNewProj]=useState(false);
  const [projName,setProjName]=useState('');
  const [projColor,setProjColor]=useState(TAG_COLORS[0]);
  const toggleProj=pn=>setTags(prev=>prev.includes(pn)?prev.filter(n=>n!==pn):[...prev,pn]);
  const createProject=()=>{if(!projName.trim())return;onCreateProject({id:uid(),name:projName.trim(),color:projColor,archived:false});setTags(prev=>[...prev,projName.trim()]);setProjName('');setNewProj(false);};
  if(confirming)return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&setConfirming(false)}><div className="modal" style={{maxWidth:360}}><div className="modal-header"><div className="modal-title">Delete this task?</div><button className="modal-close" onClick={()=>setConfirming(false)}>✕</button></div><p style={{fontSize:'13px',color:'var(--text2)',lineHeight:1.6}}><strong style={{color:'var(--text)'}}>{task.name}</strong> will be permanently removed.</p><div className="modal-footer"><div/><div className="footer-right"><button className="btn" onClick={()=>setConfirming(false)}>Cancel</button><button className="btn danger" onClick={onDelete}>Delete</button></div></div></div></div>);
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <div className="modal-header"><div className="modal-title">{name||'Untitled'}</div><button className="modal-close" onClick={onClose}>✕</button></div>
      <div className="field"><label>Task Name</label><input className="m-input" value={name} onChange={e=>setName(e.target.value)} placeholder="What needs doing?"/></div>
      <div className="field"><label>Status</label><input className="m-input" value={status} onChange={e=>setStatus(e.target.value)} placeholder="in progress, waiting on, blocked…"/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
        <div className="field"><label>Due</label><input className="m-input" value={due} onChange={e=>setDue(e.target.value)} placeholder="Mar 15"/></div>
        <div className="field"><label>Estimate</label><select className="m-input" value={estimate} onChange={e=>setEstimate(e.target.value)}><option value="">— none —</option><option value="&lt;5m">&lt;5m</option><option value="5m">5m</option><option value="10m">10m</option><option value="15m">15m</option><option value="30m">30m</option><option value="1hr">1hr</option><option value="1.5hr">1.5hr</option><option value="2hr">2hr</option></select></div>
      </div>
      <div className="field"><label>Recurring</label><div style={{display:'flex',alignItems:'center',gap:'10px'}}>
        <button className={'btn sm'+(recurring?' primary':'')} onClick={()=>setRecurring(r=>!r)}>{recurring?'On':'Off'}</button>
        {recurring&&<select className="m-input" style={{width:'auto'}} value={recurringFrequency} onChange={e=>setRecurringFrequency(e.target.value)}><option>Daily</option><option>Weekly</option><option>Biweekly</option><option>Monthly</option></select>}
      </div></div>
      <div className="field">
        <label>Projects</label>
        <div className="tag-chips-wrap">
          {(projects||[]).filter(p=>!p.archived).map(p=>{const on=tags.includes(p.name);return <span key={p.id} className="proj-chip" style={{background:on?p.color+'22':'var(--surface2)',borderColor:on?p.color:'var(--border)',color:on?p.color:'var(--text3)'}} onClick={()=>toggleProj(p.name)}>{p.name}</span>;})}
          {(projects||[]).filter(p=>!p.archived).length===0&&!newProj&&<span style={{fontSize:'11px',color:'var(--text3)',fontStyle:'italic'}}>No projects yet</span>}
        </div>
        {!newProj?<button className="btn sm" style={{marginTop:'8px'}} onClick={()=>setNewProj(true)}>+ New Project</button>:
        <div style={{marginTop:'8px',display:'flex',flexDirection:'column',gap:'6px'}}>
          <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
            <input className="m-input" style={{flex:1}} value={projName} onChange={e=>setProjName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&createProject()} placeholder="Project name…"/>

          </div>
          <div className="tag-swatches">
            {TAG_COLORS.map(c=><div key={c} className={'tag-swatch'+(projColor===c?' sel':'')} style={{background:c,borderColor:projColor===c?'#333':c+'55'}} onClick={()=>setProjColor(c)}/>)}
          </div>
        </div>}
      </div>
      <div className="field"><label>Context & Notes</label><textarea className="m-textarea" value={context} onChange={e=>setContext(e.target.value)} placeholder="Notes, links, context…"/></div>
      <div className="divider"/>
      <div className="field"><label>Attachments{attachments.length>0?' · '+attachments.length:''}</label><Attachments attachments={attachments} onChange={setAttachments}/></div>
      <div className="modal-footer">
        <button className="trash-btn" onClick={()=>setConfirming(true)}>🗑 Delete</button>
        <div className="footer-right"><button className="btn" onClick={onClose}>Cancel</button><button className="btn primary" onClick={()=>{onSave({...task,name,status,context,attachments,tags,due,estimate,recurring,recurringFrequency});onClose();}}>Save</button></div>
      </div>
    </div>
  </div>);
}

/* DONE BADGES COMPONENT */
function DoneBadges({tasks}){
  const [open,setOpen]=useState(false);
  const done=tasks.filter(t=>t.complete);
  if(done.length===0)return null;
  const visible=done.slice(0,5);
  return(
    <div style={{position:'relative',display:'inline-block'}}>
      <div className="done-badges" onClick={()=>setOpen(o=>!o)}>
        {visible.map((_,i)=><div key={i} className="done-badge">✓</div>)}
        {done.length>5&&<div className="done-badge" style={{background:'var(--text3)',fontSize:'8px'}}>+{done.length-5}</div>}
      </div>
      {open&&(
        <div className="done-bubble">
          <div className="done-bubble-title">Completed today</div>
          {done.map(t=>(
            <div key={t.id} className="done-bubble-item">
              <div className="done-bubble-check">✓</div>
              <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</span>
            </div>
          ))}
          <span className="done-bubble-close" onClick={()=>setOpen(false)}>close</span>
        </div>
      )}
    </div>
  );
}

function RolloverModal({tasks,onComplete,onDelete,onKeep,onKeepAll}){
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&onKeepAll()}>

      <div className="rollover-list">

function SyncStatus({status,onSync}){
  const [online,setOnline]=React.useState(navigator.onLine);
  React.useEffect(()=>{
    const on=()=>setOnline(true);
    const off=()=>setOnline(false);
    window.addEventListener('online',on);
    window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);
  if(!online)return(<div className="sync-bar"><div className="sync-dot err"/><span>offline — changes will sync when reconnected</span></div>);
  const cls=status==='ok'?'ok':status==='error'?'err':status==='syncing'?'syncing':'';
  const label=status==='ok'?'synced':status==='error'?'sync error':status==='syncing'?'syncing…':'connecting…';
  const syncing=status==='syncing'||status==='loading';
  return(<div className="sync-bar"><div className={'sync-dot '+cls}/><span>{label}</span>{onSync&&<button className={'sync-btn'+(syncing?' spinning':'')} disabled={syncing} onClick={onSync} title="Reload from server">↻</button>}</div>);
}

function WeeklySummary({tasks,projects,onOpenTask}){
  // Get Monday–Sunday of current week
  const now=new Date();const dayOfWeek=now.getDay();const mondayOffset=dayOfWeek===0?-6:1-dayOfWeek;
  const monday=new Date(now);monday.setDate(now.getDate()+mondayOffset);monday.setHours(0,0,0,0);
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);sunday.setHours(23,59,59,999);
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d;});

  // Gather all tasks from this week
  const weekTasks=[];
  weekDays.forEach(d=>{const k=dk(d);(tasks[k]||[]).forEach(t=>weekTasks.push({...t,dayKey:k,date:d}));});
  const completed=weekTasks.filter(t=>t.complete);
  const totalCreated=weekTasks.length;

  // Group completed by day
  const byDay={};
  weekDays.forEach(d=>{const k=dk(d);byDay[k]={date:d,tasks:[]};});
  completed.forEach(t=>{if(byDay[t.dayKey])byDay[t.dayKey].tasks.push(t);});

  return(<div style={{display:'flex',flexDirection:'column',gap:'20px'}}>
    <div style={{fontFamily:"'Fraunces',serif",fontWeight:700,fontSize:'24px',color:'var(--text)',letterSpacing:'-0.3px'}}>Weekly Summary</div>
    <div style={{fontSize:'11px',color:'var(--text3)',fontStyle:'italic'}}>{MS[monday.getMonth()]} {monday.getDate()} – {MS[sunday.getMonth()]} {sunday.getDate()}</div>

    <div style={{display:'flex',gap:'16px',flexWrap:'wrap'}}>
      <div style={{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'14px',padding:'16px 20px',flex:'1',minWidth:'120px'}}>
        <div style={{fontSize:'28px',fontFamily:"'Fraunces',serif",fontWeight:700,color:'var(--accent2)'}}>{completed.length}</div>
        <div style={{fontSize:'10px',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'1px',fontWeight:700}}>Completed</div>
      </div>
      <div style={{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'14px',padding:'16px 20px',flex:'1',minWidth:'120px'}}>
        <div style={{fontSize:'28px',fontFamily:"'Fraunces',serif",fontWeight:700,color:'var(--text)'}}>{totalCreated}</div>
        <div style={{fontSize:'10px',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'1px',fontWeight:700}}>Total Created</div>
      </div>
    </div>

    <div style={{fontSize:'9px',textTransform:'uppercase',letterSpacing:'1.8px',color:'var(--text3)',fontWeight:700}}>By Date</div>
    {weekDays.map(d=>{const k=dk(d);const dayData=byDay[k];if(!dayData||dayData.tasks.length===0)return null;return(
      <div key={k} style={{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'14px',padding:'16px 20px'}}>
        <div style={{fontSize:'9px',textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text3)',fontWeight:700,marginBottom:'10px'}}>{DAYS[d.getDay()]} · {MS[d.getMonth()]} {d.getDate()}</div>
        <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
          {dayData.tasks.map(t=><div key={t.id} style={{display:'flex',alignItems:'center',gap:'8px',padding:'7px 10px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'9px',cursor:'pointer',transition:'all .15s'}} onClick={()=>onOpenTask(t,k)}>
            <span style={{width:'14px',height:'14px',borderRadius:'50%',background:'var(--accent2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'8px',color:'#fff',fontWeight:700,flexShrink:0}}>✓</span>
            <span style={{flex:1,fontSize:'12px',fontWeight:600,color:'var(--text)',textDecoration:'line-through'}}>{t.name}</span>
            {t.estimate&&<span className="estimate-tag">{t.estimate}</span>}
            {(t.tags||[]).map((tg,i)=>{const n=tagName(tg);const p=(projects||[]).find(pr=>pr.name===n);const c=p?p.color:'var(--text3)';return <span key={i} style={{display:'inline-block',width:'8px',height:'8px',borderRadius:'50%',background:c,flexShrink:0}}/>;
            })}

        </div>
      </div>
    );})}
    {completed.length===0&&<div style={{textAlign:'center',padding:'24px 10px'}}><div style={{fontFamily:"'Fraunces',serif",fontSize:'15px',color:'var(--text3)',fontStyle:'italic',lineHeight:'1.6'}}>Nothing completed yet this week.</div><div style={{fontSize:'11px',color:'var(--text3)',marginTop:'4px'}}>You've got this.</div></div>}
  </div>);
}

const US_TZ=['America/New_York','America/Chicago','America/Denver','America/Los_Angeles','America/Anchorage','Pacific/Honolulu'];
const ALL_TZ=(()=>{try{return Intl.supportedValuesOf('timeZone').filter(t=>!US_TZ.includes(t)).sort();}catch(e){return[];}})();
const TIME_OPTS_START=(()=>{const o=[];for(let h=6;h<=21;h++)for(let m=0;m<60;m+=30){if(h===21&&m>30)break;const hh=h>12?h-12:h===0?12:h;const ap=h>=12?'pm':'am';o.push({val:h*60+m,label:`${hh}:${String(m).padStart(2,'0')}${ap}`});}return o;})();
const TIME_OPTS_END=(()=>{const o=[];for(let h=6;h<=22;h++)for(let m=0;m<60;m+=30){if(h===6&&m===0)continue;if(h===22&&m>0)break;const hh=h>12?h-12:h===0?12:h;const ap=h>=12?'pm':'am';o.push({val:h*60+m,label:`${hh}:${String(m).padStart(2,'0')}${ap}`});}return o;})();
const tzShort=tz=>{const map={'America/New_York':'New York','America/Chicago':'Chicago','America/Denver':'Denver','America/Los_Angeles':'Los Angeles','America/Anchorage':'Anchorage','Pacific/Honolulu':'Honolulu'};return map[tz]||tz.split('/').pop().replace(/_/g,' ');};
const minsToLabel=m=>{const h=Math.floor(m/60);const mm=m%60;const hh=h>12?h-12:h===0?12:h;const ap=h>=12?'pm':'am';return `${hh}:${String(mm).padStart(2,'0')}${ap}`;};

function SchedulingPrefsPanel({user,onSaved}){
  const [start,setStart]=useState(720);
  const [end,setEnd]=useState(1020);
  const [tz,setTz]=useState('America/New_York');
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [loaded,setLoaded]=useState(false);
  useEffect(()=>{
    if(!user)return;
    sb.from('user_preferences').select('*').eq('user_id',user.id).maybeSingle().then(({data})=>{
      if(data){setStart(data.scheduling_start??720);setEnd(data.scheduling_end??1020);setTz(data.timezone||'America/New_York');}
      setLoaded(true);
    });
  },[user]);
  const save=async()=>{
    if(!user)return;
    setSaving(true);setSaved(false);
    const{error}=await sb.from('user_preferences').upsert({user_id:user.id,scheduling_start:Number(start),scheduling_end:Number(end),timezone:String(tz)},{onConflict:'user_id'});
    setSaving(false);
    if(!error){setSaved(true);setTimeout(()=>setSaved(false),2000);if(onSaved)onSaved();}
  };
  if(!loaded)return null;
  return(<div className="sched-panel">
    <div className="sched-row">
      <div className="field"><label>Start Time</label><select value={start} onChange={e=>setStart(Number(e.target.value))}>{TIME_OPTS_START.map(o=><option key={o.val} value={o.val}>{o.label}</option>)}</select></div>
      <div className="field"><label>End Time</label><select value={end} onChange={e=>setEnd(Number(e.target.value))}>{TIME_OPTS_END.filter(o=>o.val>start).map(o=><option key={o.val} value={o.val}>{o.label}</option>)}</select></div>
    </div>
    <div className="field"><label>Timezone</label><select value={tz} onChange={e=>setTz(e.target.value)}>
      <optgroup label="US Timezones">{US_TZ.map(t=><option key={t} value={t}>{tzShort(t)}</option>)}</optgroup>
      <optgroup label="All Timezones">{ALL_TZ.map(t=><option key={t} value={t}>{t}</option>)}</optgroup>
    </select></div>
    <button className="btn primary sched-save" onClick={save} disabled={saving||saved}>{saving?'Saving…':saved?'Saved ✓':'Save Preferences'}</button>
  </div>);
}

      {task.context&&<div className="field"><label>Context & Notes</label><div style={{fontSize:'13px',color:'var(--text2)',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>{task.context}</div></div>}
      {(task.tags||[]).length>0&&<div className="field"><label>Projects</label><div className="tag-chips-wrap">
        {(task.tags||[]).map((t,i)=>{const n=tagName(t);const p=(projects||[]).find(pr=>pr.name===n);const c=p?p.color:'var(--text3)';return <span key={i} className="proj-chip" style={{background:c+'22',borderColor:c,color:c}}>{n}</span>;})}
      </div></div>}
      {(task.attachments||[]).length>0&&<div className="field"><label>Attachments</label><div className="attach-list">
        {task.attachments.map(a=>{const{icon,cls}=fIcon(a.name);return <div key={a.id} className="attach-item"><div className={'a-icon '+cls}>{icon}</div><div className="a-info"><div className="a-name">{a.name}</div><div className="a-meta">{fmtSize(a.size)}</div></div></div>;})}
      </div></div>}
      <div className="modal-footer"><div/><button className="btn" onClick={onClose}>Close</button></div>
    </div>
  </div>);
}

function App(){
  const days=next8();
  const [session,setSession]=useState(undefined); // undefined=loading, null=no session, object=session
  const [user,setUser]=useState(null);
  const [tasks,setTasks]=useState({});
  const [forward,setForward]=useState([]);
  const [sel,setSel]=useState(()=>{const t=new Date().toDateString();const i=days.findIndex(d=>d.toDateString()===t);return i>=0?i:0;});
  const [editing,setEditing]=useState(null);
  const [editFwd,setEditFwd]=useState(null);
  const [mobTab,setMobTab]=useState('today');
  const [syncStatus,setSyncStatus]=useState('loading');
  const saveTimer=useRef(null);
  const mainRef=useRef(null);
  const [mediaItems,setMediaItems]=useState(()=>mediaLoad());
  const [showAllCompleted,setShowAllCompleted]=useState(false);
  const [addMediaModal,setAddMediaModal]=useState(false);
  const [editMedia,setEditMedia]=useState(null);
  const [projects,setProjects]=useState([]);
  const [projectDetail,setProjectDetail]=useState(null);
  const [readOnlyTask,setReadOnlyTask]=useState(null);
  const [addingForProject,setAddingForProject]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [rolloverTasks,setRolloverTasks]=useState([]);
  const [calConnected,setCalConnected]=useState(false);
  const [schedPrefs,setSchedPrefs]=useState(null);

  // Load scheduling preferences
  const loadSchedPrefs=async(userId)=>{
    const{data}=await sb.from('user_preferences').select('*').eq('user_id',userId).maybeSingle();
    setSchedPrefs(data);
  };

  // Check if user has calendar connected
  const checkCalConnection=async(userId)=>{
    const{data}=await sb.from('user_calendars').select('id').eq('user_id',userId).maybeSingle();
    setCalConnected(!!data);
  };

  // Save provider refresh token after OAuth redirect
  const saveCalTokenIfNeeded=async(s)=>{
    if(!s?.provider_refresh_token||!s?.user?.id)return;
    const{data:existing}=await sb.from('user_calendars').select('id').eq('user_id',s.user.id).maybeSingle();
    if(!existing){
      await sb.from('user_calendars').upsert({user_id:s.user.id,refresh_token:s.provider_refresh_token},{onConflict:'user_id'});
    }
    setCalConnected(true);
  };

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session:s}})=>{
      currentUserId=s?.user?.id||null;
      setSession(s||null);
      setUser(s?.user||null);
      if(s?.user?.id){checkCalConnection(s.user.id);loadSchedPrefs(s.user.id);}
      saveCalTokenIfNeeded(s);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_event,s)=>{
      currentUserId=s?.user?.id||null;
      setSession(s||null);
      setUser(s?.user||null);
      if(s?.user?.id){checkCalConnection(s.user.id);loadSchedPrefs(s.user.id);}
      if(_event==='SIGNED_IN')saveCalTokenIfNeeded(s);
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleLogout=async()=>{await sb.auth.signOut();setShowSettings(false);};

  const connectCal=async()=>{
    await sb.auth.signInWithOAuth({provider:'google',options:{
      redirectTo:'https://vasquezryanj-sudo.github.io/TaskBloc/',
      scopes:'https://www.googleapis.com/auth/calendar',
      queryParams:{access_type:'offline',prompt:'consent'}
    }});
  };

  const disconnectCal=async()=>{
    if(!user)return;
    await sb.from('user_calendars').delete().eq('user_id',user.id);
    setCalConnected(false);
  };

  const fullSync=async()=>{setSyncStatus('syncing');try{const[t,f,p]=await Promise.all([dbLoadTasks(),dbLoadForward(),dbLoadProjects()]);setTasks(t);setForward(f);setProjects(p);setSyncStatus('ok');checkRollover(t);}catch(e){console.error(e);setSyncStatus('error');}};

  const checkRollover=(tasksObj)=>{
    const todayKey=estTodayKey();
    const lastRollover=localStorage.getItem(ROLLOVER_KEY);
    if(lastRollover===todayKey)return; // already processed today
    const today=estNow();today.setHours(0,0,0,0);
    const rollovers=[];
    Object.entries(tasksObj).forEach(([dayKey,dayTasks])=>{
      const d=parseDk(dayKey);
      if(d<today){
        dayTasks.filter(t=>!t.complete).forEach(t=>rollovers.push({...t,_fromDayKey:dayKey}));
      }
    });
    if(rollovers.length>0){
      // Move incomplete past tasks to today
      setTasks(prev=>{
        const next={...prev};
        const todayArr=[...(next[todayKey]||[])];
        rollovers.forEach(t=>{
          const fromKey=t._fromDayKey;
          if(next[fromKey])next[fromKey]=next[fromKey].filter(x=>x.id!==t.id);
          const{_fromDayKey,...clean}=t;
          todayArr.push(clean);
        });
        next[todayKey]=todayArr;
        // Schedule save for the moved tasks
        setForward(fwd=>{scheduleSave(next,fwd);return fwd;});
        return next;
      });
      setRolloverTasks(rollovers.map(t=>{const{_fromDayKey,...clean}=t;return clean;}));
    }
    localStorage.setItem(ROLLOVER_KEY,todayKey);
  };
  useEffect(()=>{if(session)fullSync();},[session]);

  // Re-check rollover on visibility change (tab/app refocus) and at midnight EST
  useEffect(()=>{
    if(!session)return;
    const onVisible=()=>{if(document.visibilityState==='visible')fullSync();};
    document.addEventListener('visibilitychange',onVisible);
    // Schedule a sync just after midnight EST
    const now=estNow();
    const midnight=new Date(now);midnight.setDate(midnight.getDate()+1);midnight.setHours(0,0,10,0);
    const ms=midnight-now;
    const midnightTimer=setTimeout(()=>fullSync(),ms);
    return()=>{document.removeEventListener('visibilitychange',onVisible);clearTimeout(midnightTimer);};
  },[session]);

  const scheduleSave=(tasksObj,fwdArr)=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    setSyncStatus('syncing');
    saveTimer.current=setTimeout(async()=>{try{const ops=[];Object.entries(tasksObj).forEach(([dayKey,ts])=>{ts.forEach((t,i)=>ops.push(dbUpsertTask(t,dayKey,i)));});fwdArr.forEach((t,i)=>ops.push(dbUpsertForward(t,i)));await Promise.all(ops);setSyncStatus('ok');}catch(e){console.error(e);setSyncStatus('error');}},800);
  };

  const addTask=(k,n)=>{const task={id:uid(),name:n,status:'',context:'',complete:false,attachments:[],tags:[],due:'',estimate:'',recurring:false,recurringFrequency:''};setTasks(prev=>{const next={...prev,[k]:[...(prev[k]||[]),task]};scheduleSave(next,forward);return next;});};
  const toggleTask=(k,id)=>setTasks(p=>{const next={...p,[k]:(p[k]||[]).map(t=>t.id===id?{...t,complete:!t.complete}:t)};scheduleSave(next,forward);return next;});
  const saveTask=(k,u)=>setTasks(p=>{const next={...p,[k]:(p[k]||[]).map(t=>t.id===u.id?u:t)};scheduleSave(next,forward);return next;});
  const updTasks=(k,a)=>setTasks(p=>{const next={...p,[k]:a};scheduleSave(next,forward);return next;});
  const delTask=(k,id)=>{dbDeleteTask(id);setTasks(p=>{const next={...p,[k]:(p[k]||[]).filter(t=>t.id!==id)};scheduleSave(next,forward);return next;});setEditing(null);};
  const movTask=(f,t,id)=>setTasks(p=>{const task=(p[f]||[]).find(x=>x.id===id);if(!task)return p;const next={...p,[f]:(p[f]||[]).filter(x=>x.id!==id),[t]:[...(p[t]||[]),task]};scheduleSave(next,forward);return next;});
  const moveToFwd=(fd,id)=>{const task=(tasks[fd]||[]).find(t=>t.id===id);if(!task)return;setTasks(prev=>{const next={...prev,[fd]:(prev[fd]||[]).filter(t=>t.id!==id)};const nf=[...forward,task];scheduleSave(next,nf);setForward(nf);return next;});};
  const addFwd=n=>{const task={id:uid(),name:n,status:'',context:'',complete:false,attachments:[],tags:[],due:'',estimate:'',recurring:false,recurringFrequency:''};setForward(prev=>{const next=[...prev,task];scheduleSave(tasks,next);return next;});};
  const remFwd=id=>{dbDeleteForward(id);setForward(p=>{const next=p.filter(t=>t.id!==id);scheduleSave(tasks,next);return next;});};
  const saveFwd=u=>setForward(p=>{const next=p.map(t=>t.id===u.id?u:t);scheduleSave(tasks,next);return next;});
  const delFwd=id=>{dbDeleteForward(id);setForward(p=>{const next=p.filter(t=>t.id!==id);scheduleSave(tasks,next);return next;});setEditFwd(null);};
  const toggleFwd=id=>{const task=forward.find(t=>t.id===id);if(!task)return;if(!task.complete){const completed={...task,complete:true};const todayKey=dk(new Date());dbDeleteForward(id);setForward(p=>{const next=p.filter(t=>t.id!==id);setTasks(prevT=>{const nextT={...prevT,[todayKey]:[...(prevT[todayKey]||[]),completed]};scheduleSave(nextT,next);return nextT;});return next;});}else{setForward(p=>{const next=p.map(t=>t.id===id?{...t,complete:false}:t);scheduleSave(tasks,next);return next;});}};
  const moveFwdToDay=(id,dayKey)=>{const task=forward.find(t=>t.id===id);if(!task)return;dbDeleteForward(id);setForward(prev=>{const next=prev.filter(t=>t.id!==id);setTasks(prevT=>{const nextT={...prevT,[dayKey]:[...(prevT[dayKey]||[]),task]};scheduleSave(nextT,next);return nextT;});return next;});};

  const addMedia=item=>{const next=[...mediaItems,item];setMediaItems(next);mediaSave(next);};
  const updateMedia=item=>{const next=mediaItems.map(m=>m.id===item.id?item:m);setMediaItems(next);mediaSave(next);};
  const removeMedia=id=>{const next=mediaItems.filter(m=>m.id!==id);setMediaItems(next);mediaSave(next);};
  const toggleMediaComplete=id=>{const next=mediaItems.map(m=>m.id===id?{...m,status:m.status==='completed'?'reading':'completed',completedAt:m.status==='completed'?null:Date.now()}:m);setMediaItems(next);mediaSave(next);};
  const updateMediaQuotes=(id,quotes)=>{const next=mediaItems.map(m=>m.id===id?{...m,quotes}:m);setMediaItems(next);mediaSave(next);};

  const createProject=p=>{setProjects(prev=>[...prev,p]);dbUpsertProject(p).catch(console.error);};
  const archiveProject=id=>{setProjects(prev=>prev.map(p=>p.id===id?{...p,archived:true}:p));const proj=projects.find(p=>p.id===id);if(proj)dbUpsertProject({...proj,archived:true}).catch(console.error);};

  // Rollover actions
  const rolloverComplete=id=>{
    const todayKey=estTodayKey();
    setTasks(prev=>{const next={...prev,[todayKey]:(prev[todayKey]||[]).map(t=>t.id===id?{...t,complete:true}:t)};scheduleSave(next,forward);return next;});
    setRolloverTasks(prev=>{const next=prev.filter(t=>t.id!==id);return next;});
  };
  const rolloverDelete=id=>{
    const todayKey=estTodayKey();
    dbDeleteTask(id);
    setTasks(prev=>{const next={...prev,[todayKey]:(prev[todayKey]||[]).filter(t=>t.id!==id)};scheduleSave(next,forward);return next;});
    setRolloverTasks(prev=>prev.filter(t=>t.id!==id));
  };
  const rolloverKeepAll=()=>setRolloverTasks([]);

  /* ── pull-to-refresh (mobile) ── */
  const [pullY,setPullY]=useState(0);
  const [pulling,setPulling]=useState(false);
  const touchStartY=useRef(0);
  const pullThreshold=70;
  useEffect(()=>{
    const el=mainRef.current;if(!el)return;
    const inScrollable=t=>{let n=t;while(n&&n!==el){const ov=getComputedStyle(n).overflowY;if(ov==='auto'||ov==='scroll')return true;n=n.parentElement;}return false;};
    const onStart=e=>{if(el.scrollTop===0&&!inScrollable(e.target)){touchStartY.current=e.touches[0].clientY;setPulling(true);}};
    const onMove=e=>{if(!pulling)return;const dy=e.touches[0].clientY-touchStartY.current;if(dy>0&&el.scrollTop===0){e.preventDefault();setPullY(Math.min(dy,120));}};
    const onEnd=async()=>{if(pullY>=pullThreshold){await fullSync();}setPullY(0);setPulling(false);};
    el.addEventListener('touchstart',onStart,{passive:true});
    el.addEventListener('touchmove',onMove,{passive:false});
    el.addEventListener('touchend',onEnd,{passive:true});
    return()=>{el.removeEventListener('touchstart',onStart);el.removeEventListener('touchmove',onMove);el.removeEventListener('touchend',onEnd);};
  });

  const selectDay=(i)=>{
    setSel(i);
    setMobTab('today');
    // scroll main back to top
    if(mainRef.current)mainRef.current.scrollTo({top:0,behavior:'smooth'});
  };

  const cur=days[sel],ck=dk(cur),ct=tasks[ck]||[];

  const sidebarDays=days.map((d,i)=>{const k=dk(d),count=(tasks[k]||[]).length,done=(tasks[k]||[]).filter(t=>t.complete).length;return(
    <div key={k} className={'s-day'+(i===0?' today':'')+(sel===i?' active':'')} onClick={()=>selectDay(i)}>
      <div className="s-day-label">{i===0?'Today':DAYS[d.getDay()]}</div>
      <div className="s-day-date">{MS[d.getMonth()]} {d.getDate()}</div>
      {count>0&&<div className="s-day-count">{done}/{count} complete</div>}
    </div>
  );});

  const weekStrip=(<div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
    <div className="strip-label">Coming Up</div>
    <div className="week-row">
      {/* Today card first so you can scroll back */}
      <div className={'week-card'+(sel===0?' is-today':'')} onClick={()=>selectDay(0)}
        onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('drop-target');}}
        onDragLeave={e=>e.currentTarget.classList.remove('drop-target')}
        onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('drop-target');const tid=e.dataTransfer.getData('taskId'),fd=e.dataTransfer.getData('fromDay'),k0=dk(days[0]);if(fd==='forward')moveFwdToDay(tid,k0);else if(fd&&fd!==k0)movTask(fd,k0,tid);}}>
        <div className="week-card-header"><div><div className="week-day-name">Today</div><div className="week-day-month">{MS[days[0].getMonth()]}</div></div><div className="week-day-num">{days[0].getDate()}</div></div>
        {(tasks[dk(days[0])]||[]).filter(t=>!t.complete).length===0?<div className="week-empty">{(tasks[dk(days[0])]||[]).length>0?'all done':'nothing yet'}</div>:(tasks[dk(days[0])]||[]).filter(t=>!t.complete).map(t=><div key={t.id} className="week-pill"><span className="week-pill-dot"/>{t.name}</div>)}
      </div>
      {days.slice(1).map((d,i)=>{const k=dk(d),dt=tasks[k]||[];return(
        <div key={k} className={'week-card'+(sel===i+1?' is-today':'')} onClick={()=>selectDay(i+1)}
          onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('drop-target');}}
          onDragLeave={e=>e.currentTarget.classList.remove('drop-target')}
          onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('drop-target');const tid=e.dataTransfer.getData('taskId'),fd=e.dataTransfer.getData('fromDay');if(fd==='forward')moveFwdToDay(tid,k);else if(fd&&fd!==k)movTask(fd,k,tid);}}>
          <div className="week-card-header"><div><div className="week-day-name">{DAYS[d.getDay()]}</div><div className="week-day-month">{MS[d.getMonth()]}</div></div><div className="week-day-num">{d.getDate()}</div></div>
          {dt.filter(t=>!t.complete).length===0?<div className="week-empty">{dt.length>0?'all done':'nothing yet'}</div>:dt.filter(t=>!t.complete).map(t=><div key={t.id} className="week-pill"><span className="week-pill-dot"/>{t.name}</div>)}
        </div>
      );})}
    </div>
  </div>);

  if(session===undefined)return null; // still loading auth
  if(!session)return <LoginScreen/>;

  return(<div className="app">
    <div className="sidebar">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div className="sidebar-logo" style={{cursor:'pointer'}} onClick={()=>{setSel(0);setMobTab('today');}}>TaskBloc</div>
        <button className="settings-gear" onClick={()=>setShowSettings(true)} title="Settings">⚙</button>
      </div>
      <div className="sidebar-sub">your days, organized</div>
      <SyncStatus status={syncStatus} onSync={fullSync}/>
      <div className="sidebar-section">This Week</div>
      {sidebarDays.slice(0,3)}
      <div style={{height:'1px',background:'linear-gradient(90deg,transparent,var(--border),transparent)',margin:'10px 6px'}}/>
      <div className={'s-reading-link'+(mobTab==='projects'?' active':'')} onClick={()=>setMobTab('projects')}>
        <span>📂</span><span className="s-reading-link-label">Projects</span>
      </div>
      <div className={'s-reading-link'+(mobTab==='summary'?' active':'')} onClick={()=>setMobTab('summary')}>
        <span>📊</span><span className="s-reading-link-label">Weekly Summary</span>
      </div>
    </div>

    <div className="main" ref={mainRef}>
      {pullY>0&&<div className="pull-indicator" style={{height:pullY+'px'}}>{pullY>=pullThreshold?'release to sync':'pull to sync'}</div>}
      {mobTab==='today'&&<>
        <SyncStatus status={syncStatus}/>
        <DayBlock date={cur} tasks={ct} isToday={sel===0} onAdd={addTask} onToggle={toggleTask} onOpen={t=>setEditing({task:t,dayKey:ck})} onUpdateTasks={updTasks} onMoveTask={movTask} onMoveFromForward={moveFwdToDay} projects={projects}/>
        {weekStrip}
        <LookingForward items={forward} onDrop={moveToFwd} onRemove={remFwd} onOpen={t=>setEditFwd(t)} onAdd={addFwd} onToggle={toggleFwd}/>
      </>}
      {mobTab==='forward'&&<LookingForward items={forward} onDrop={moveToFwd} onRemove={remFwd} onOpen={t=>setEditFwd(t)} onAdd={addFwd} onToggle={toggleFwd}/>}
      {mobTab==='projects'&&<ProjectsView projects={projects} tasks={tasks} forward={forward} onArchive={archiveProject} onOpen={t=>{if(t.dayKey==='forward')setEditFwd(t);else setEditing({task:t,dayKey:t.dayKey});}} onProjectClick={p=>setProjectDetail(p)} onCreateProject={createProject}/>}
      {mobTab==='summary'&&<WeeklySummary tasks={tasks} projects={projects} onOpenTask={(t,k)=>setEditing({task:t,dayKey:k})}/>}
      {mobTab==='reading'&&(!showAllCompleted
        ?<MediaPage items={mediaItems} onAdd={()=>setAddMediaModal(true)} onEdit={setEditMedia} onRemove={removeMedia} onToggleComplete={toggleMediaComplete} onUpdateQuotes={updateMediaQuotes} onViewAll={()=>setShowAllCompleted(true)}/>
        :<AllCompletedPage items={mediaItems.filter(m=>m.status==='completed')} onBack={()=>setShowAllCompleted(false)}/>
      )}
    </div>

    <button className="mob-gear" onClick={()=>setShowSettings(true)} title="Settings">⚙</button>
    <nav className="mob-nav">
      <button className={'mob-btn'+(mobTab==='today'?' active':'')} onClick={()=>setMobTab('today')}><span className="mob-icon">📋</span>Today</button>
      <button className={'mob-btn'+(mobTab==='projects'?' active':'')} onClick={()=>setMobTab('projects')}><span className="mob-icon">📂</span>Projects</button>
      <button className={'mob-btn'+(mobTab==='summary'?' active':'')} onClick={()=>setMobTab('summary')}><span className="mob-icon">📊</span>Summary</button>
    </nav>

    {editing&&<TaskModal task={editing.task} onClose={()=>setEditing(null)} onSave={u=>{saveTask(editing.dayKey,u);setEditing(null);}} onDelete={()=>delTask(editing.dayKey,editing.task.id)} projects={projects} onCreateProject={createProject}/>}
    {editFwd&&<TaskModal task={editFwd} onClose={()=>setEditFwd(null)} onSave={u=>{saveFwd(u);setEditFwd(null);}} onDelete={()=>delFwd(editFwd.id)} projects={projects} onCreateProject={createProject}/>}
    {projectDetail&&<ProjectDetailModal project={projectDetail} tasks={tasks} forward={forward} projects={projects} onClose={()=>setProjectDetail(null)} onOpenTask={(t,readOnly)=>{if(readOnly){setReadOnlyTask(t);}else{if(t.dayKey==='forward')setEditFwd(t);else setEditing({task:t,dayKey:t.dayKey});}}} onAddTask={()=>{setAddingForProject({id:uid(),name:'',status:'',context:'',complete:false,attachments:[],tags:[projectDetail.name],due:'',estimate:'',recurring:false,recurringFrequency:''});}}/>}
    {readOnlyTask&&<ReadOnlyTaskModal task={readOnlyTask} onClose={()=>setReadOnlyTask(null)} projects={projects}/>}
    {addingForProject&&<TaskModal task={addingForProject} onClose={()=>setAddingForProject(null)} onSave={u=>{const todayKey=dk(new Date());setTasks(prev=>{const next={...prev,[todayKey]:[...(prev[todayKey]||[]),u]};scheduleSave(next,forward);return next;});setAddingForProject(null);}} onDelete={()=>setAddingForProject(null)} projects={projects} onCreateProject={createProject}/>}
    {showSettings&&<SettingsDrawer onClose={()=>setShowSettings(false)} user={user} onLogout={handleLogout} calConnected={calConnected} onConnectCal={connectCal} onDisconnectCal={disconnectCal} schedPrefs={schedPrefs} onSchedSaved={()=>user&&loadSchedPrefs(user.id)}/>}
    {(addMediaModal||editMedia)&&<MediaEntryModal entry={editMedia||{}} onClose={()=>{setAddMediaModal(false);setEditMedia(null);}} onSave={item=>{editMedia?updateMedia(item):addMedia(item);setAddMediaModal(false);setEditMedia(null);}} onDelete={editMedia?()=>{removeMedia(editMedia.id);setEditMedia(null);}:undefined}/>}
    {rolloverTasks.length>0&&<RolloverModal tasks={rolloverTasks} onComplete={rolloverComplete} onDelete={rolloverDelete} onKeep={id=>setRolloverTasks(prev=>prev.filter(t=>t.id!==id))} onKeepAll={rolloverKeepAll}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/TaskBloc/sw.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.log('SW failed:', e));
  });
}
</script>
</body>
</html>
