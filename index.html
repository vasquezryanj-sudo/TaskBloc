<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,500&family=Nunito:wght@300;400;500;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* Core palette */
  --bg:#f7f3ee;
  --bg2:#efe8de;
  --surface:#fdfaf6;
  --surface2:#f5ede3;
  --surface3:#ead9c8;
  --border:#ddd0be;
  --border2:#c9b89e;

  /* Accent */
  --accent:#b8501e;
  --accent-mid:#c9622e;
  --accent-light:#f5e8e0;
  --accent2:#5a8c60;
  --accent2-light:#e4f0e6;

  /* Text */
  --text:#2a1f14;
  --text2:#6b5744;
  --text3:#a8917a;

  /* Tones */
  --gold:#b8892a;
  --gold-light:#faf0d8;
  --purple:#7a62a8;
  --purple-light:#ede8f8;

  /* Shadow */
  --shadow:rgba(80,50,20,0.07);
  --shadow2:rgba(80,50,20,0.13);
  --shadow3:rgba(80,50,20,0.20);

  --safe-bottom:env(safe-area-inset-bottom,0px);

  /* Typography */
  --font-display:'Lora',Georgia,serif;
  --font-body:'Nunito',system-ui,sans-serif;
  --font-mono:'Nunito',monospace;
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
#root{height:100%;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}

/* ── LAYOUT ── */
.app{display:flex;height:100dvh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
  width:224px;min-width:224px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:28px 16px 20px;
  gap:2px;
  box-shadow:3px 0 20px var(--shadow);
  overflow-y:auto;flex-shrink:0;
}
.sidebar-logo{
  font-family:var(--font-display);
  font-weight:700;font-size:22px;
  color:var(--accent);
  letter-spacing:-0.3px;
  margin-bottom:3px;
}
.sidebar-sub{
  font-size:10px;font-weight:300;
  color:var(--text3);
  letter-spacing:0.4px;
  margin-bottom:24px;
  font-style:italic;
}
.sidebar-section{
  font-family:var(--font-mono);
  font-size:9px;text-transform:uppercase;
  letter-spacing:1.8px;color:var(--text3);
  padding:14px 10px 6px;
}
.s-day{
  padding:10px 12px;border-radius:10px;
  cursor:pointer;transition:all .15s;
  border:1.5px solid transparent;
  position:relative;
}
.s-day:hover{background:var(--surface2);}
.s-day.active{background:var(--surface2);border-color:var(--border);}
.s-day.today{border-color:var(--accent)!important;background:var(--accent-light);}
.s-day-label{
  font-family:var(--font-mono);
  font-size:9px;text-transform:uppercase;
  letter-spacing:1.2px;color:var(--text3);
}
.s-day.today .s-day-label{color:var(--accent-mid);}
.s-day-date{font-size:13px;font-weight:500;color:var(--text);margin-top:2px;}
.s-day-count{font-size:10px;color:var(--text3);margin-top:2px;font-weight:300;}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:32px 28px 40px;display:flex;flex-direction:column;gap:22px;}

/* ── DAY BLOCK ── */
.day-block{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:26px 26px 20px;
  box-shadow:0 2px 16px var(--shadow),0 1px 3px var(--shadow);
  position:relative;
}
.day-block::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent) 0%,var(--gold) 60%,var(--accent-mid) 100%);
  border-radius:18px 18px 0 0;
}
.block-header{
  display:flex;align-items:flex-start;
  justify-content:space-between;
  gap:12px;margin-bottom:18px;flex-wrap:wrap;
}
.block-title-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.block-title{
  font-family:var(--font-display);
  font-weight:700;font-size:26px;
  color:var(--text);letter-spacing:-0.5px;
  line-height:1.1;
}
.block-sub{
  font-size:11px;font-weight:300;
  color:var(--text3);margin-top:4px;
  font-style:italic;letter-spacing:0.2px;
}

/* ── DONE BADGES ── */
.done-badges{display:flex;align-items:center;gap:2px;position:relative;cursor:pointer;margin-bottom:2px;}
.done-badge{
  width:17px;height:17px;border-radius:50%;
  background:var(--accent2);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#fff;font-weight:600;
  border:2px solid var(--surface);
  margin-left:-5px;transition:transform .15s;
  box-shadow:0 1px 3px var(--shadow2);
}
.done-badge:first-child{margin-left:0;}
.done-badges:hover .done-badge{transform:scale(1.12);}
.done-bubble{
  position:absolute;top:calc(100% + 10px);left:0;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;padding:12px 14px;
  min-width:210px;max-width:290px;
  box-shadow:0 8px 30px var(--shadow3);
  z-index:50;animation:mIn .15s ease;
}
.done-bubble-title{
  font-family:var(--font-mono);
  font-size:9px;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--text3);
  margin-bottom:10px;
}
.done-bubble-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 0;border-bottom:1px solid var(--border);
  font-size:12px;color:var(--text2);text-decoration:line-through;
  font-weight:300;
}
.done-bubble-item:last-child{border-bottom:none;}
.done-bubble-check{
  width:15px;height:15px;border-radius:50%;
  background:var(--accent2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;color:#fff;
}
.done-bubble-close{
  display:block;margin-top:10px;
  font-size:10px;color:var(--text3);
  text-align:center;cursor:pointer;
  font-style:italic;font-weight:300;
  transition:color .12s;
}
.done-bubble-close:hover{color:var(--accent);}

/* ── TASK LIST ── */
.task-list-wrap{
  overflow-y:auto;
  max-height:calc(4 * 60px);
  display:flex;flex-direction:column;gap:7px;
  padding-right:2px;
}
.task-list-wrap::-webkit-scrollbar{width:2px;}
.task-list-wrap::-webkit-scrollbar-thumb{background:var(--border2);}

/* ── BUTTONS ── */
.btn{
  padding:8px 16px;border-radius:22px;
  font-family:var(--font-body);
  font-size:12px;font-weight:500;
  cursor:pointer;
  border:1.5px solid var(--border);
  background:var(--surface);
  color:var(--text2);
  transition:all .18s;white-space:nowrap;
  letter-spacing:0.1px;
}
.btn:hover{background:var(--surface2);border-color:var(--border2);color:var(--text);}
.btn:disabled{opacity:.45;cursor:default;}
.btn.primary{
  background:var(--accent);color:#fff;
  border-color:var(--accent);
  box-shadow:0 2px 8px rgba(184,80,30,0.25);
}
.btn.primary:hover{background:var(--accent-mid);box-shadow:0 3px 12px rgba(184,80,30,0.35);}
.btn.gold{
  background:var(--gold-light);
  border-color:rgba(184,137,42,0.35);
  color:var(--gold);
}
.btn.gold:hover{background:#f5e8c0;border-color:var(--gold);}
.btn.gold.sent{background:var(--accent2-light);border-color:var(--accent2);color:var(--accent2);}
.btn.danger{background:#fde8e4;border-color:#f0b4a8;color:#c0392b;}
.btn.danger:hover{background:#fbd4cc;}
.btn.sm{padding:5px 12px;font-size:11px;}
.btn.purple{background:var(--purple-light);border-color:rgba(122,98,168,0.3);color:var(--purple);}
.btn.purple:hover{background:#e4ddf5;border-color:var(--purple);}

/* ── ADD ROW ── */
.add-row{display:flex;gap:8px;margin-bottom:16px;}
.add-input{
  flex:1;
  background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:22px;
  padding:10px 18px;
  font-family:var(--font-body);
  font-size:13px;font-weight:400;
  color:var(--text);
  outline:none;
  transition:all .18s;min-width:0;
}
.add-input::placeholder{color:var(--text3);font-weight:300;font-style:italic;}
.add-input:focus{
  border-color:var(--accent-mid);
  background:var(--surface);
  box-shadow:0 0 0 3px rgba(184,80,30,0.1);
}

/* ── TASK ITEMS ── */
.task-item{
  background:#faf6ef;
  border:1px solid var(--border);
  border-radius:13px;
  padding:12px 14px;
  display:flex;align-items:center;gap:10px;
  cursor:grab;
  transition:all .18s;
  position:relative;user-select:none;
  box-shadow:0 1px 4px var(--shadow);
  flex-shrink:0;
}
.task-item:hover{
  border-color:var(--border2);
  background:var(--surface);
  box-shadow:0 3px 12px var(--shadow2);
  transform:translateY(-1px);
}
.task-item.dragging{opacity:.35;cursor:grabbing;transform:none;}
.task-item.drag-over{
  border-color:var(--accent-mid);
  border-style:dashed;
  background:var(--accent-light);
}
.drag-handle{
  color:var(--border2);font-size:13px;
  opacity:0;flex-shrink:0;
  transition:opacity .15s;
}
.task-item:hover .drag-handle{opacity:1;}
.task-check{
  width:19px;height:19px;border-radius:50%;
  border:1.5px solid var(--border2);
  flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.task-check:hover{border-color:var(--accent2);background:var(--accent2-light);}
.task-check.on{background:var(--accent2);border-color:var(--accent2);box-shadow:0 0 0 3px var(--accent2-light);}
.task-check.on::after{content:'✓';font-size:10px;color:#fff;font-weight:600;}
.task-body{flex:1;min-width:0;}
.task-name{
  font-size:13px;font-weight:500;
  color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.task-status{
  font-size:10px;color:var(--accent-mid);
  margin-top:2px;font-style:italic;font-weight:300;
  letter-spacing:0.1px;
}
.task-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.attach-badge{font-size:10px;color:var(--text3);font-weight:300;}
.time-tag{
  font-family:var(--font-mono);
  font-size:10px;color:var(--text2);
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:6px;padding:2px 7px;
  font-weight:500;flex-shrink:0;
  letter-spacing:0.2px;
}
.open-btn{
  background:none;border:none;
  color:var(--text3);cursor:pointer;
  font-size:13px;padding:4px 5px;
  border-radius:7px;transition:all .12s;flex-shrink:0;
}
.open-btn:hover{color:var(--accent);background:var(--accent-light);}

@keyframes completeSlide{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(24px);}}
.task-item.completing{animation:completeSlide .28s ease forwards;}

.drop-zone-hint{
  border:1.5px dashed var(--border);
  border-radius:11px;padding:10px;
  text-align:center;font-size:11px;
  color:var(--text3);margin-top:12px;
  transition:all .15s;font-style:italic;
  font-weight:300;flex-shrink:0;
}
.drop-zone-hint.active{border-color:var(--accent-mid);color:var(--accent-mid);background:var(--accent-light);}

/* ── WEEK STRIP ── */
.strip-label{
  font-family:var(--font-mono);
  font-size:9px;text-transform:uppercase;
  letter-spacing:1.8px;color:var(--text3);
}
.week-row{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px;}
.week-card{
  min-width:138px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;padding:13px;
  flex-shrink:0;cursor:pointer;
  transition:all .18s;
  box-shadow:0 1px 6px var(--shadow);
}
.week-card:hover{border-color:var(--border2);box-shadow:0 4px 14px var(--shadow2);transform:translateY(-2px);}
.week-card.drop-target{border-color:var(--accent-mid)!important;background:var(--accent-light);}
.week-card.is-today{border-color:var(--accent);background:var(--accent-light);}
.week-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}
.week-day-name{
  font-family:var(--font-mono);
  font-weight:500;font-size:9px;
  text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);
}
.week-day-month{font-size:8px;color:var(--text3);margin-top:2px;font-weight:300;}
.week-day-num{
  font-family:var(--font-display);
  font-weight:700;font-size:22px;
  color:var(--text);line-height:1;
}
.week-pill{
  background:var(--surface2);border-radius:5px;
  padding:4px 7px;font-size:10px;
  color:var(--text2);margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:5px;
  border:1px solid var(--border);font-weight:300;
}
.week-pill.done{text-decoration:line-through;color:var(--text3);opacity:.5;}
.week-pill-dot{width:4px;height:4px;border-radius:50%;background:var(--accent-mid);flex-shrink:0;}
.week-pill.done .week-pill-dot{background:var(--text3);}
.week-empty{font-size:10px;color:var(--text3);font-style:italic;font-weight:300;}

/* ── LOOKING FORWARD ── */
.lf-block{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;padding:22px 24px 20px;
  box-shadow:0 2px 16px var(--shadow);
  position:relative;
}
.lf-block::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--purple),#a892d8);
  border-radius:18px 18px 0 0;
}
.lf-block.drop-active{border-color:var(--purple);background:var(--purple-light);}
.lf-title{
  font-family:var(--font-display);
  font-weight:700;font-size:20px;
  color:var(--text);letter-spacing:-0.3px;
  margin-bottom:4px;
}
.lf-sub{
  font-size:11px;font-weight:300;
  color:var(--text3);font-style:italic;
  margin-bottom:14px;letter-spacing:0.2px;
}
.lf-list{
  overflow-y:auto;max-height:260px;
  display:flex;flex-direction:column;gap:6px;
  margin-bottom:10px;
}
.lf-list::-webkit-scrollbar{width:2px;}
.lf-list::-webkit-scrollbar-thumb{background:var(--border2);}
.lf-item{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:11px;padding:10px 13px;
  display:flex;align-items:center;gap:9px;
  box-shadow:0 1px 3px var(--shadow);
  transition:all .15s;flex-shrink:0;
}
.lf-item:hover{border-color:var(--border2);background:var(--surface);}
.lf-item-done{opacity:.55;background:var(--bg2)!important;}
.lf-name-done{text-decoration:line-through;color:var(--text3)!important;font-weight:300!important;}
.lf-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--purple);flex-shrink:0;opacity:.5;
}
.lf-name{
  flex:1;font-size:13px;font-weight:500;
  color:var(--text);min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.lf-remove{
  background:none;border:none;color:var(--text3);

<script type="text/babel">
const {useState,useEffect,useRef}=React;

const SUPA_URL='https://fcgebmeefugxtaddpgvi.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjZ2VibWVlZnVneHRhZGRwZ3ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzUxMTUsImV4cCI6MjA4NzgxMTExNX0.zcQfE9XnlIHqS2Atm5tTW_fVlmjX4MaaL6Y61tIXmyk';

const next8=()=>Array.from({length:8},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i);return d;});
const dk=d=>d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();

const TIME_OPTS=['','<5m','5m','10m','15m','30m','1hr'];
function timeToMins(t){if(!t)return 0;if(t==='<5m')return 5;if(t==='5m')return 5;if(t==='10m')return 10;if(t==='15m')return 15;if(t==='30m')return 30;if(t==='1hr')return 60;return 0;}
function totalMins(tasks){return tasks.filter(t=>!t.complete).reduce((s,t)=>s+timeToMins(t.estimate),0);}
function fmtMins(m){if(!m)return'';if(m<60)return m+'m';const h=Math.floor(m/60),r=m%60;return r?h+'h '+r+'m':h+'h';}
const fIcon=n=>{if(!n)return{icon:'🔗',cls:'lnk'};const e=n.split('.').pop().toLowerCase();if(['jpg','jpeg','png','gif','webp','svg'].includes(e))return{icon:'🖼',cls:'img'};if(e==='pdf')return{icon:'📄',cls:'pdf'};if(['doc','docx','txt','md'].includes(e))return{icon:'📝',cls:'doc'};return{icon:'📎',cls:'def'};};
const fmtSize=b=>{if(!b)return'';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';};

const CLIENT_ID='992169341355-40u7rg338i4jrhmrbu5hivedkvd0dqqs.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/calendar.events';
function getToken(){return new Promise((res,rej)=>{if(!window.google){rej(new Error('Google not loaded'));return;}window.google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:r=>{if(r.error)rej(new Error(r.error));else res(r.access_token);}}).requestAccessToken();});}
async function pushCal(date,tasks){
  const token=await getToken();
  const ds=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  const incTasks=tasks.filter(t=>!t.complete);
  const total=totalMins(incTasks)||60;
  const endH=Math.floor((8*60+total)/60),endM=(8*60+total)%60;
  const endStr=`${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}`;
  const list=incTasks.map(t=>`• ${t.name}${t.estimate?' ('+t.estimate+')':''}`).join('\n');
  const body=JSON.stringify({summary:'Task Bloc',colorId:'6',description:`TaskBloc tasks for ${ds}\n\n${list}\n\n🔗 ${window.location.href}`,start:{dateTime:`${ds}T08:00:00`,timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone},end:{dateTime:`${ds}T${endStr}:00`,timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone}});
  const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body});
  if(!r.ok)throw new Error('Calendar API '+r.status);
  return r.json();
}

// ── OFFLINE QUEUE ──
const QUEUE_KEY='taskbloc_queue';
function qLoad(){try{return JSON.parse(localStorage.getItem(QUEUE_KEY))||[];}catch{return[];}}
function qSave(q){localStorage.setItem(QUEUE_KEY,JSON.stringify(q));}
function qAdd(op){const q=qLoad();q.push(op);qSave(q);}

async function qFlush(){
  if(!navigator.onLine)return;
  const q=qLoad();
  if(q.length===0)return;
  qSave([]); // optimistically clear
  try{
    await Promise.all(q.map(op=>{
      if(op.type==='upsertTask')return sb.from('tasks').upsert(op.data);
      if(op.type==='deleteTask')return sb.from('tasks').delete().eq('id',op.id);
      if(op.type==='upsertForward')return sb.from('forward_tasks').upsert(op.data);
      if(op.type==='deleteForward')return sb.from('forward_tasks').delete().eq('id',op.id);
    }));
  }catch(e){
    // restore queue if flush fails
    const remaining=qLoad();
    qSave([...q,...remaining]);
    throw e;
  }
}

// Flush queue whenever we come back online
window.addEventListener('online',()=>qFlush().catch(console.error));

async function dbLoadTasks(){
  if(!navigator.onLine){
    // Return cached data from localStorage if offline
    try{return JSON.parse(localStorage.getItem('taskbloc_tasks'))||{};}catch{return{};}
  }
  const{data,error}=await sb.from('tasks').select('*').order('position');
  if(error)throw error;
  const map={};(data||[]).forEach(r=>{if(!map[r.day_key])map[r.day_key]=[];map[r.day_key].push({id:r.id,name:r.name,status:r.status,estimate:r.estimate||'',context:r.context,complete:r.complete,attachments:r.attachments||[]});});
  return map;
}
async function dbLoadForward(){
  if(!navigator.onLine){
    try{return JSON.parse(localStorage.getItem('taskbloc_forward'))||[];}catch{return[];}
  }
  const{data,error}=await sb.from('forward_tasks').select('*').order('position');
  if(error)throw error;
  return(data||[]).map(r=>({id:r.id,name:r.name,status:r.status,estimate:r.estimate||'',context:r.context,complete:r.complete,attachments:r.attachments||[]}));
}
async function dbUpsertTask(task,dayKey,position){
  const data={id:task.id,day_key:dayKey,name:task.name,status:task.status,estimate:task.estimate||'',context:task.context,complete:task.complete,attachments:task.attachments,position};
  if(!navigator.onLine){qAdd({type:'upsertTask',data});return;}
  try{await sb.from('tasks').upsert(data);}catch(e){qAdd({type:'upsertTask',data});throw e;}
}
async function dbDeleteTask(id){
  if(!navigator.onLine){qAdd({type:'deleteTask',id});return;}
  try{await sb.from('tasks').delete().eq('id',id);}catch(e){qAdd({type:'deleteTask',id});throw e;}
}
async function dbUpsertForward(task,position){
  const data={id:task.id,name:task.name,status:task.status,estimate:task.estimate||'',context:task.context,complete:task.complete,attachments:task.attachments,position};
  if(!navigator.onLine){qAdd({type:'upsertForward',data});return;}
  try{await sb.from('forward_tasks').upsert(data);}catch(e){qAdd({type:'upsertForward',data});throw e;}
}
async function dbDeleteForward(id){
  if(!navigator.onLine){qAdd({type:'deleteForward',id});return;}
  try{await sb.from('forward_tasks').delete().eq('id',id);}catch(e){qAdd({type:'deleteForward',id});throw e;}
}

function Attachments({attachments,onChange}){
  const [link,setLink]=useState('');const [over,setOver]=useState(false);
  const addFiles=fs=>{const n=Array.from(fs).map(f=>({id:uid(),name:f.name,size:f.size,type:'file',url:null}));onChange([...attachments,...n]);};
  const addLink=()=>{if(!link.trim())return;const url=link.trim();onChange([...attachments,{id:uid(),name:url.replace(/^https?:\/\//,'').split('/')[0],url,type:'link',size:null}]);setLink('');};
  const remove=id=>onChange(attachments.filter(a=>a.id!==id));
  return(<div style={{display:'flex',flexDirection:'column',gap:'9px'}}>
    <div className={'file-drop'+(over?' over':'')} onDragOver={e=>{e.preventDefault();setOver(true);}} onDragLeave={()=>setOver(false)} onDrop={e=>{e.preventDefault();setOver(false);addFiles(e.dataTransfer.files);}}>
      <input type="file" multiple onChange={e=>addFiles(e.target.files)}/><div className="file-drop-icon">📁</div><div className="file-drop-label">Drop files or tap to browse</div><div className="file-drop-sub">Syncs once storage connected</div>
    </div>
    <div className="link-row"><input className="m-input" placeholder="Paste a link (Drive, Notion, Dropbox…)" value={link} onChange={e=>setLink(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addLink()}/><button className="btn sm" onClick={addLink}>Add</button></div>
    {attachments.length>0&&<div className="attach-list">{attachments.map(a=>{const{icon,cls}=a.type==='link'?{icon:'🔗',cls:'lnk'}:fIcon(a.name);return(<div key={a.id} className="attach-item"><div className={'a-icon '+cls}>{icon}</div><div className="a-info"><div className="a-name">{a.name}</div><div className="a-meta">{a.type==='link'?a.url:fmtSize(a.size)+' · pending'}</div></div><button className="a-remove" onClick={()=>remove(a.id)}>✕</button></div>);})}</div>}
  </div>);
}

function TaskModal({task,onClose,onSave,onDelete}){
  const [name,setName]=useState(task.name);const [status,setStatus]=useState(task.status);const [estimate,setEstimate]=useState(task.estimate||'');const [context,setContext]=useState(task.context);const [attachments,setAttachments]=useState(task.attachments||[]);const [confirming,setConfirming]=useState(false);
  if(confirming)return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&setConfirming(false)}><div className="modal" style={{maxWidth:360}}><div className="modal-header"><div className="modal-title">Delete this task?</div><button className="modal-close" onClick={()=>setConfirming(false)}>✕</button></div><p style={{fontSize:'13px',color:'var(--text2)',lineHeight:1.6}}><strong style={{color:'var(--text)'}}>{task.name}</strong> will be permanently removed.</p><div className="modal-footer"><div/><div className="footer-right"><button className="btn" onClick={()=>setConfirming(false)}>Cancel</button><button className="btn danger" onClick={onDelete}>Delete</button></div></div></div></div>);
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal"><div className="modal-header"><div className="modal-title">{name||'Untitled'}</div><button className="modal-close" onClick={onClose}>✕</button></div><div className="field"><label>Task Name</label><input className="m-input" value={name} onChange={e=>setName(e.target.value)} placeholder="What needs doing?"/></div><div style={{display:'flex',gap:'10px'}}><div className="field" style={{flex:1}}><label>Status</label><input className="m-input" value={status} onChange={e=>setStatus(e.target.value)} placeholder="in progress, waiting on…"/></div><div className="field" style={{width:'110px'}}><label>Est. Time</label><select className="m-select" value={estimate} onChange={e=>setEstimate(e.target.value)}>{TIME_OPTS.map(o=><option key={o} value={o}>{o||'— none —'}</option>)}</select></div></div><div className="field"><label>Context & Notes</label><textarea className="m-textarea" value={context} onChange={e=>setContext(e.target.value)} placeholder="Notes, links, context…"/></div><div className="divider"/><div className="field"><label>Attachments{attachments.length>0?' · '+attachments.length:''}</label><Attachments attachments={attachments} onChange={setAttachments}/></div><div className="modal-footer"><button className="trash-btn" onClick={()=>setConfirming(true)}>🗑 Delete</button><div className="footer-right"><button className="btn" onClick={onClose}>Cancel</button><button className="btn primary" onClick={()=>{onSave({...task,name,status,context,attachments,estimate});onClose();}}>Save</button></div></div></div></div>);
}

/* DONE BADGES COMPONENT */
function DoneBadges({tasks}){
  const [open,setOpen]=useState(false);
  const done=tasks.filter(t=>t.complete);
  if(done.length===0)return null;
  const visible=done.slice(0,5);
  return(
    <div style={{position:'relative',display:'inline-block'}}>
      <div className="done-badges" onClick={()=>setOpen(o=>!o)}>
        {visible.map((_,i)=><div key={i} className="done-badge">✓</div>)}
        {done.length>5&&<div className="done-badge" style={{background:'var(--text3)',fontSize:'8px'}}>+{done.length-5}</div>}
      </div>
      {open&&(
        <div className="done-bubble">
          <div className="done-bubble-title">Completed today</div>
          {done.map(t=>(
            <div key={t.id} className="done-bubble-item">
              <div className="done-bubble-check">✓</div>
              <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</span>
            </div>
          ))}
          <span className="done-bubble-close" onClick={()=>setOpen(false)}>close</span>
        </div>
      )}
    </div>
  );
}

function TaskItem({task,onToggle,onOpen,onDragStart,onDragOver,onDrop,isDragging,isDragOver}){
  const [completing,setCompleting]=useState(false);
  const handleToggle=()=>{
    if(!task.complete){setCompleting(true);setTimeout(()=>{onToggle(task.id);setCompleting(false);},280);}
    else onToggle(task.id);
  };
  return(<div className={'task-item'+(isDragging?' dragging':'')+(isDragOver?' drag-over':'')+(completing?' completing':'')} draggable onDragStart={e=>onDragStart(e,task.id)} onDragOver={e=>{e.preventDefault();onDragOver(task.id);}} onDrop={e=>{e.preventDefault();onDrop(task.id);}}>
    <span className="drag-handle">⠿</span>
    <div className={'task-check'+(task.complete?' on':'')} onClick={handleToggle}/>
    <div className="task-body"><div className="task-name">{task.name}</div>{task.status&&<div className="task-status">{task.status}</div>}</div>
    <div className="task-meta">{task.estimate&&<span className="time-tag">{task.estimate}</span>}{(task.attachments||[]).length>0&&<span className="attach-badge">📎{task.attachments.length}</span>}<button className="open-btn" onClick={()=>onOpen(task)}>↗</button></div>
  </div>);
}

function DayBlock({date,tasks,isToday,onAdd,onToggle,onOpen,onUpdateTasks,onMoveTask,onSendCal}){
  const [newName,setNewName]=useState('');const [dragOver,setDragOver]=useState(null);const [draggingId,setDraggingId]=useState(null);const [zoneActive,setZoneActive]=useState(false);const [calStatus,setCalStatus]=useState('idle');
  const key=dk(date);
  const hDragStart=(e,id)=>{setDraggingId(id);e.dataTransfer.setData('taskId',id);e.dataTransfer.setData('fromDay',key);};
  const hDrop=tid=>{if(!draggingId||draggingId===tid){setDraggingId(null);setDragOver(null);return;}const fi=tasks.findIndex(t=>t.id===draggingId),ti=tasks.findIndex(t=>t.id===tid);if(fi===-1||ti===-1)return;const arr=[...tasks];const[m]=arr.splice(fi,1);arr.splice(ti,0,m);onUpdateTasks(key,arr);setDraggingId(null);setDragOver(null);};
  const hZoneDrop=e=>{e.preventDefault();const tid=e.dataTransfer.getData('taskId'),fd=e.dataTransfer.getData('fromDay');if(fd&&fd!==key)onMoveTask(fd,key,tid);setZoneActive(false);};
  const add=()=>{if(!newName.trim())return;onAdd(key,newName.trim());setNewName('');};
  const sendCal=async()=>{
    setCalStatus('sending');
    try{await pushCal(date,tasks);setCalStatus('sent');setTimeout(()=>setCalStatus('idle'),3000);}
    catch(e){setCalStatus('error');setTimeout(()=>setCalStatus('idle'),3000);}
  };
  const inc=tasks.filter(t=>!t.complete);
  const calLabel=calStatus==='sending'?'sending…':calStatus==='sent'?'sent ✓':calStatus==='error'?'error':'send to calendar';
  return(
    <div className="day-block">
      <div className="block-header">
        <div>
          <div className="block-title-row">
            <div className="block-title">{isToday?'Today':DAYS[date.getDay()]}</div>
            <DoneBadges tasks={tasks}/>
          </div>
          <div className="block-sub">{DAYS[date.getDay()]}, {MONTHS[date.getMonth()]} {date.getDate()}{inc.length>0&&' · '+inc.length+' open'}{totalMins(tasks)>0&&' · ~'+fmtMins(totalMins(tasks))}</div>
        </div>
        <button className={'btn gold'+(calStatus==='sent'?' primary':'')} onClick={sendCal} disabled={calStatus==='sending'} style={calStatus==='sent'?{background:'var(--accent2)',borderColor:'var(--accent2)',color:'#fff'}:{}}>{calLabel}</button>
      </div>
      <div className="add-row"><input className="add-input" placeholder="Add a task…" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/><button className="btn primary" onClick={add}>Add</button></div>
      <div className="task-list-wrap">
        {tasks.filter(t=>!t.complete).length===0&&tasks.filter(t=>t.complete).length===0&&<div style={{fontSize:'12px',color:'var(--text3)',fontStyle:'italic',padding:'6px 2px'}}>Nothing here yet.</div>}
        {inc.map(t=><TaskItem key={t.id} task={t} onToggle={id=>onToggle(key,id)} onOpen={onOpen} onDragStart={hDragStart} onDragOver={setDragOver} onDrop={hDrop} isDragging={draggingId===t.id} isDragOver={dragOver===t.id}/>)}
      </div>
      <div className={'drop-zone-hint'+(zoneActive?' active':'')} onDragOver={e=>{e.preventDefault();setZoneActive(true);}} onDragLeave={()=>setZoneActive(false)} onDrop={hZoneDrop}>drag a task here from another day</div>
    </div>
  );
}

function LookingForward({items,onDrop,onRemove,onOpen,onAdd,onToggle}){
  const [active,setActive]=useState(false);
  const [newName,setNewName]=useState('');
  const hDrop=e=>{e.preventDefault();const tid=e.dataTransfer.getData('taskId'),fd=e.dataTransfer.getData('fromDay');if(tid&&fd)onDrop(fd,tid);setActive(false);};
  const add=()=>{if(!newName.trim())return;onAdd(newName.trim());setNewName('');};
  return(<div className={'lf-block'+(active?' drop-active':'')} onDragOver={e=>{e.preventDefault();setActive(true);}} onDragLeave={()=>setActive(false)} onDrop={hDrop}>
    <div className="lf-title">Looking Forward</div>
    <div className="lf-sub">Tasks beyond this week.</div>
    <div className="lf-add-row">
      <input className="lf-add-input" placeholder="Add a future task…" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/>
      <button className="btn sm purple" onClick={add}>Add</button>
    </div>
    {items.length>0&&<div className="lf-list">{items.map(t=>(<div key={t.id} className={'lf-item'+(t.complete?' lf-item-done':'')}><div className={'task-check'+(t.complete?' on':'')} style={{width:'17px',height:'17px',flexShrink:0}} onClick={()=>onToggle(t.id)}/><span className={'lf-name'+(t.complete?' lf-name-done':'')}>{t.name}</span>{t.estimate&&!t.complete&&<span className="time-tag">{t.estimate}</span>}{t.status&&!t.complete&&<span style={{fontSize:'10px',color:'var(--purple)',fontStyle:'italic',flexShrink:0}}>{t.status}</span>}{(t.attachments||[]).length>0&&<span style={{fontSize:'10px',color:'var(--text3)',flexShrink:0}}>📎{t.attachments.length}</span>}<button className="open-btn" style={{flexShrink:0}} onClick={()=>onOpen(t)}>↗</button><button className="lf-remove" onClick={()=>onRemove(t.id)}>✕</button></div>))}</div>}
    <div className="lf-drop-hint">{items.length===0?'Drop tasks here to save for later':'Drop more tasks here'}</div>
  </div>);
}

function SyncStatus({status,onSync}){
  const [online,setOnline]=React.useState(navigator.onLine);
  React.useEffect(()=>{
    const on=()=>setOnline(true);
    const off=()=>setOnline(false);
    window.addEventListener('online',on);
    window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);
  if(!online)return(<div className="sync-bar"><div className="sync-dot err"/><span>offline — changes will sync when reconnected</span></div>);
  const cls=status==='ok'?'ok':status==='error'?'err':status==='syncing'?'syncing':'';
  const label=status==='ok'?'synced':status==='error'?'sync error':status==='syncing'?'syncing…':'connecting…';
  return(
    <div className="sync-bar">
      <div className={'sync-dot '+cls}/>
      <span>{label}</span>
      <button className="sync-btn" onClick={onSync} disabled={status==='syncing'} title="Sync now">↻</button>
    </div>
  );
}

function App(){
  const days=next8();
  const [tasks,setTasks]=useState({});
  const [forward,setForward]=useState([]);
  const [sel,setSel]=useState(0);
  const [editing,setEditing]=useState(null);
  const [editFwd,setEditFwd]=useState(null);
  const [mobTab,setMobTab]=useState('today');
  const [syncStatus,setSyncStatus]=useState('loading');
  const saveTimer=useRef(null);
  const mainRef=useRef(null);
  const pullStartY=useRef(null);
  const [pullDistance,setPullDistance]=useState(0);
  const PULL_THRESHOLD=70;

  const manualSync=async()=>{
    if(syncStatus==='syncing')return;
    setSyncStatus('syncing');
    try{
      await qFlush();
      const[t,f]=await Promise.all([dbLoadTasks(),dbLoadForward()]);
      setTasks(t);setForward(f);setSyncStatus('ok');
    }catch(e){console.error(e);setSyncStatus('error');}
  };

  // Pull to refresh
  useEffect(()=>{
    const el=mainRef.current;
    if(!el)return;
    const onStart=e=>{if(el.scrollTop===0)pullStartY.current=e.touches[0].clientY;};
    const onMove=e=>{
      if(pullStartY.current===null)return;
      const dist=e.touches[0].clientY-pullStartY.current;
      if(dist>0&&el.scrollTop===0){e.preventDefault();setPullDistance(Math.min(dist,PULL_THRESHOLD+20));}
    };
    const onEnd=()=>{
      if(pullDistance>=PULL_THRESHOLD)manualSync();
      pullStartY.current=null;setPullDistance(0);
    };
    el.addEventListener('touchstart',onStart,{passive:true});
    el.addEventListener('touchmove',onMove,{passive:false});
    el.addEventListener('touchend',onEnd);
    return()=>{el.removeEventListener('touchstart',onStart);el.removeEventListener('touchmove',onMove);el.removeEventListener('touchend',onEnd);};
  },[pullDistance,syncStatus]);

  useEffect(()=>{(async()=>{try{const[t,f]=await Promise.all([dbLoadTasks(),dbLoadForward()]);setTasks(t);setForward(f);setSyncStatus('ok');}catch(e){console.error(e);setSyncStatus('error');}})();},[]);

  const scheduleSave=(tasksObj,fwdArr)=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    setSyncStatus('syncing');
    saveTimer.current=setTimeout(async()=>{try{const ops=[];Object.entries(tasksObj).forEach(([dayKey,ts])=>{ts.forEach((t,i)=>ops.push(dbUpsertTask(t,dayKey,i)));});fwdArr.forEach((t,i)=>ops.push(dbUpsertForward(t,i)));await Promise.all(ops);setSyncStatus('ok');}catch(e){console.error(e);setSyncStatus('error');}},800);
  };

  const addTask=(k,n)=>{const task={id:uid(),name:n,status:'',estimate:'',context:'',complete:false,attachments:[]};setTasks(prev=>{const next={...prev,[k]:[...(prev[k]||[]),task]};scheduleSave(next,forward);return next;});};
  const toggleTask=(k,id)=>setTasks(p=>{const next={...p,[k]:(p[k]||[]).map(t=>t.id===id?{...t,complete:!t.complete}:t)};scheduleSave(next,forward);return next;});
  const saveTask=(k,u)=>setTasks(p=>{const next={...p,[k]:(p[k]||[]).map(t=>t.id===u.id?u:t)};scheduleSave(next,forward);return next;});
  const updTasks=(k,a)=>setTasks(p=>{const next={...p,[k]:a};scheduleSave(next,forward);return next;});
  const delTask=(k,id)=>{dbDeleteTask(id);setTasks(p=>{const next={...p,[k]:(p[k]||[]).filter(t=>t.id!==id)};scheduleSave(next,forward);return next;});setEditing(null);};
  const movTask=(f,t,id)=>setTasks(p=>{const task=(p[f]||[]).find(x=>x.id===id);if(!task)return p;const next={...p,[f]:(p[f]||[]).filter(x=>x.id!==id),[t]:[...(p[t]||[]),task]};scheduleSave(next,forward);return next;});
  const moveToFwd=(fd,id)=>{const task=(tasks[fd]||[]).find(t=>t.id===id);if(!task)return;setTasks(prev=>{const next={...prev,[fd]:(prev[fd]||[]).filter(t=>t.id!==id)};const nf=[...forward,task];scheduleSave(next,nf);setForward(nf);return next;});};
  const addFwd=n=>{const task={id:uid(),name:n,status:'',estimate:'',context:'',complete:false,attachments:[]};setForward(prev=>{const next=[...prev,task];scheduleSave(tasks,next);return next;});};
  const remFwd=id=>{dbDeleteForward(id);setForward(p=>{const next=p.filter(t=>t.id!==id);scheduleSave(tasks,next);return next;});};
  const toggleFwd=id=>setForward(p=>{const next=p.map(t=>t.id===id?{...t,complete:!t.complete}:t);scheduleSave(tasks,next);return next;});
  const saveFwd=u=>setForward(p=>{const next=p.map(t=>t.id===u.id?u:t);scheduleSave(tasks,next);return next;});
  const delFwd=id=>{dbDeleteForward(id);setForward(p=>{const next=p.filter(t=>t.id!==id);scheduleSave(tasks,next);return next;});setEditFwd(null);};

  const selectDay=(i)=>{
    setSel(i);
    setMobTab('today');
    // scroll main back to top
    if(mainRef.current)mainRef.current.scrollTo({top:0,behavior:'smooth'});
  };

  const cur=days[sel],ck=dk(cur),ct=tasks[ck]||[];

  const sidebarDays=days.map((d,i)=>{const k=dk(d),count=(tasks[k]||[]).length,done=(tasks[k]||[]).filter(t=>t.complete).length;return(
    <div key={k} className={'s-day'+(i===0?' today':'')+(sel===i?' active':'')} onClick={()=>selectDay(i)}>
      <div className="s-day-label">{i===0?'Today':DAYS[d.getDay()]}</div>
      <div className="s-day-date">{MS[d.getMonth()]} {d.getDate()}</div>
      {count>0&&<div className="s-day-count">{done}/{count} complete</div>}
    </div>
  );});

  const weekStrip=(<div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
    <div className="strip-label">Coming Up</div>
    <div className="week-row">
      {/* Today card first so you can scroll back */}
      <div className={'week-card'+(sel===0?' is-today':'')} onClick={()=>selectDay(0)}>
        <div className="week-card-header"><div><div className="week-day-name">Today</div><div className="week-day-month">{MS[days[0].getMonth()]}</div></div><div className="week-day-num">{days[0].getDate()}</div></div>
        {(tasks[dk(days[0])]||[]).filter(t=>!t.complete).length===0?<div className="week-empty">{(tasks[dk(days[0])]||[]).length>0?'all done':'clear'}</div>:(tasks[dk(days[0])]||[]).filter(t=>!t.complete).map(t=><div key={t.id} className="week-pill"><span className="week-pill-dot"/>{t.name}</div>)}
      </div>
      {days.slice(1).map((d,i)=>{const k=dk(d),dt=tasks[k]||[];return(
        <div key={k} className={'week-card'+(sel===i+1?' is-today':'')} onClick={()=>selectDay(i+1)}
          onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('drop-target');}}
          onDragLeave={e=>e.currentTarget.classList.remove('drop-target')}
          onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('drop-target');const tid=e.dataTransfer.getData('taskId'),fd=e.dataTransfer.getData('fromDay');if(fd&&fd!==k)movTask(fd,k,tid);}}>
          <div className="week-card-header"><div><div className="week-day-name">{DAYS[d.getDay()]}</div><div className="week-day-month">{MS[d.getMonth()]}</div></div><div className="week-day-num">{d.getDate()}</div></div>
          {dt.filter(t=>!t.complete).length===0?<div className="week-empty">{dt.length>0?'all done':'clear'}</div>:dt.filter(t=>!t.complete).map(t=><div key={t.id} className="week-pill"><span className="week-pill-dot"/>{t.name}</div>)}
        </div>
      );})}
    </div>
  </div>);

  return(<div className="app">
    <div className="sidebar">
      <div className="sidebar-logo">TaskBloc</div>
      <div className="sidebar-sub">your days, organized</div>
      <SyncStatus status={syncStatus} onSync={manualSync}/>
      <div className="sidebar-section">This Week</div>
      {sidebarDays}
      {forward.length>0&&<><div className="sidebar-section" style={{color:'var(--purple)'}}>Looking Forward</div><div className="s-day" style={{cursor:'default'}}><div className="s-day-count" style={{color:'var(--purple)',fontSize:'10px'}}>{forward.length} task{forward.length!==1?'s':''} parked</div></div></>}
    </div>

    <div className="main" ref={mainRef}>
      {pullDistance>0&&<div className="pull-indicator" style={{height:pullDistance+'px'}}><span className={'pull-spinner'+(pullDistance>=PULL_THRESHOLD?' spin':'')}>↻</span><span>{pullDistance>=PULL_THRESHOLD?'release to sync':'pull to sync'}</span></div>}
      {mobTab==='today'&&<>
        <SyncStatus status={syncStatus} onSync={manualSync}/>
        <DayBlock date={cur} tasks={ct} isToday={sel===0} onAdd={addTask} onToggle={toggleTask} onOpen={t=>setEditing({task:t,dayKey:ck})} onUpdateTasks={updTasks} onMoveTask={movTask}/>
        {weekStrip}
        <LookingForward items={forward} onDrop={moveToFwd} onRemove={remFwd} onOpen={t=>setEditFwd(t)} onAdd={addFwd} onToggle={toggleFwd}/>
      </>}
      {mobTab==='days'&&<><div className="sidebar-section" style={{fontSize:'11px',paddingLeft:0}}>This Week</div><div style={{display:'flex',flexDirection:'column',gap:'8px'}}>{sidebarDays}</div></>}
      {mobTab==='forward'&&<LookingForward items={forward} onDrop={moveToFwd} onRemove={remFwd} onOpen={t=>setEditFwd(t)} onAdd={addFwd} onToggle={toggleFwd}/>}
    </div>

    <nav className="mob-nav">
      <button className={'mob-btn'+(mobTab==='today'?' active':'')} onClick={()=>setMobTab('today')}><span className="mob-icon">📋</span>Today</button>
      <button className={'mob-btn'+(mobTab==='days'?' active':'')} onClick={()=>setMobTab('days')}><span className="mob-icon">📅</span>Days</button>
      <button className={'mob-btn'+(mobTab==='forward'?' active':'')} onClick={()=>setMobTab('forward')}><span className="mob-icon">🔭</span>Forward</button>
    </nav>

    {editing&&<TaskModal task={editing.task} onClose={()=>setEditing(null)} onSave={u=>{saveTask(editing.dayKey,u);setEditing(null);}} onDelete={()=>delTask(editing.dayKey,editing.task.id)}/>}
    {editFwd&&<TaskModal task={editFwd} onClose={()=>setEditFwd(null)} onSave={u=>{saveFwd(u);setEditFwd(null);}} onDelete={()=>delFwd(editFwd.id)}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/TaskBloc/sw.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.log('SW failed:', e));
  });
}
</script>
</body>
</html>
